<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  /* ── Panel ── */
  .panel {
    width: 100%; height: 100%;
    background: rgba(12, 12, 22, 0.74);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    color: #fff;
    overflow: hidden;
    transform-origin: top right;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .panel.hiding {
    opacity: 0;
    transform: scale(0.88);
    pointer-events: none;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 13px 18px 11px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .header-title {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.88);
  }
  .header-count {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }
  .btn-minimize {
    width: 22px; height: 22px;
    border: none;
    background: none;
    cursor: pointer;
    color: rgba(255,255,255,0.28);
    font-size: 17px;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .btn-minimize:hover {
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.08);
  }

  /* ── List ── */
  .list {
    overflow-y: auto;
    flex: 1;
    padding: 6px 0;
  }
  .list::-webkit-scrollbar { width: 3px; }
  .list::-webkit-scrollbar-track { background: transparent; }
  .list::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
  }

  /* ── Row ── */
  .item {
    display: flex;
    align-items: center;
    padding: 6px 14px;
    gap: 10px;
    transition: background 0.12s;
    cursor: default;
  }
  .item:hover { background: rgba(255,255,255,0.04); }
  .item.top1 { background: rgba(255,210,50,0.06); }
  .item.top2 { background: rgba(200,200,200,0.05); }
  .item.top3 { background: rgba(190,120,55,0.06); }

  .rank {
    width: 20px;
    text-align: center;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.25);
  }
  .rank.medal { font-size: 16px; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    overflow: hidden;
    position: relative;
  }
  .avatar img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
  }

  .name {
    flex: 1;
    font-size: 12.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: rgba(255,255,255,0.82);
  }

  .pts {
    font-size: 11.5px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    flex-shrink: 0;
  }
  .top1 .pts { color: rgba(255,210,50,0.75); }
  .top2 .pts { color: rgba(200,200,200,0.65); }
  .top3 .pts { color: rgba(205,140,75,0.75); }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.05);
    margin: 4px 14px;
  }

  .state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.3px;
  }

  /* ── Self bar ── */
  .self-bar {
    flex-shrink: 0;
    border-top: 1px solid rgba(100,140,255,0.18);
    background: rgba(70,110,255,0.07);
    padding: 7px 14px 8px;
  }
  .self-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.8px;
    color: rgba(140,170,255,0.55);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .self-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .self-item .rank {
    color: rgba(140,170,255,0.75);
    font-size: 11px;
    font-weight: 700;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .self-item .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(100,140,255,0.15);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: rgba(180,200,255,0.8);
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1.5px rgba(100,140,255,0.3);
  }
  .self-item .avatar img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
  }
  .self-item .name {
    flex: 1;
    font-size: 12.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: rgba(200,215,255,0.88);
  }
  .self-item .pts {
    font-size: 11.5px;
    font-weight: 600;
    color: rgba(140,170,255,0.75);
    flex-shrink: 0;
  }

  /* ── Ball ── */
  .ball {
    display: none;
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 46px; height: 46px;
    border-radius: 50%;
    background: rgba(12, 12, 22, 0.82);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border: 1px solid rgba(255,255,255,0.13);
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .ball:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 24px rgba(0,0,0,0.55);
  }
  .ball:active { transform: scale(0.95); }

  @keyframes ballIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .ball.visible {
    display: flex;
    animation: ballIn 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
</style>
</head>
<body>
<div class="panel" id="panel">
  <div class="header">
    <span class="header-title">积分排行榜</span>
    <span class="header-count" id="count"></span>
    <button class="btn-minimize" id="btnMin" title="最小化">–</button>
  </div>
  <div class="list" id="list">
    <div class="state">加载中…</div>
  </div>
  <div class="self-bar" id="selfBar" style="display:none">
    <div class="self-label">我的排名</div>
    <div class="self-item">
      <span class="rank" id="selfRank"></span>
      <div class="avatar" id="selfAvatar"></div>
      <span class="name" id="selfName"></span>
      <span class="pts" id="selfPts"></span>
    </div>
  </div>
</div>

<div class="ball" id="ball">榜</div>

<script>
  const MEDALS = ['🥇','🥈','🥉'];
  const TOP_CLS = ['top1','top2','top3'];

  var panel = document.getElementById('panel');
  var ball  = document.getElementById('ball');

  function minimize() {
    panel.classList.add('hiding');
    setTimeout(function() {
      panel.style.display = 'none';
      panel.classList.remove('hiding');
      ball.classList.add('visible');
    }, 200);
  }

  function expand() {
    ball.classList.remove('visible');
    panel.style.display = 'flex';
    // 触发回流以启动过渡
    panel.offsetHeight;
    panel.style.opacity = '1';
    panel.style.transform = 'none';
  }

  document.getElementById('btnMin').addEventListener('click', minimize);
  ball.addEventListener('click', expand);

  function renderList(users) {
    var list  = document.getElementById('list');
    var count = document.getElementById('count');

    if (!users || !users.length) {
      list.innerHTML = '<div class="state">暂无数据</div>';
      return;
    }

    count.textContent = 'TOP ' + users.length;

    list.innerHTML = users.map(function(u) {
      var i = u.rank - 1;
      var initial = u.name ? u.name.charAt(0).toUpperCase() : '?';

      var rankHtml = i < 3
        ? '<span class="rank medal">' + MEDALS[i] + '</span>'
        : '<span class="rank">' + u.rank + '</span>';

      var avatarInner = u.profilePhoto
        ? '<img src="' + u.profilePhoto + '" alt="' + initial + '" onerror="this.remove()">'
          + '<span>' + initial + '</span>'
        : initial;

      var divider = u.rank === 3 ? '<div class="divider"></div>' : '';

      return '<div class="item ' + (TOP_CLS[i] || '') + '">'
        + rankHtml
        + '<div class="avatar">' + avatarInner + '</div>'
        + '<span class="name">' + u.name + '</span>'
        + '<span class="pts">' + u.points + '</span>'
        + '</div>'
        + divider;
    }).join('');
  }

  function renderSelfBar(selfUser) {
    var bar = document.getElementById('selfBar');
    if (!selfUser) { bar.style.display = 'none'; return; }

    var initial = selfUser.name ? selfUser.name.charAt(0).toUpperCase() : '?';

    document.getElementById('selfRank').textContent = '#' + selfUser.rank;
    document.getElementById('selfName').textContent = selfUser.name;
    document.getElementById('selfPts').textContent = selfUser.points;

    var avatarEl = document.getElementById('selfAvatar');
    if (selfUser.profilePhoto) {
      avatarEl.innerHTML = '<img src="' + selfUser.profilePhoto + '" alt="' + initial + '" onerror="this.remove()">'
        + '<span>' + initial + '</span>';
    } else {
      avatarEl.innerHTML = initial;
    }

    bar.style.display = '';
  }

  // 通知页面代码组件已就绪
  window.parent.postMessage({ type: 'ready' }, '*');

  // 接收页面代码通过 $w('#htmlLeaderboard').postMessage() 传入的数据
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'leaderboard') {
      renderList(e.data.users);
      renderSelfBar(e.data.selfUser || null);
    }
  });
</script>
</body>
</html>
