<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: transparent;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #f7f8ff;
  }
  body { overflow: hidden; }
  .app {
    width: 100%;
    height: 100%;
    padding: 18px;
    background:
      radial-gradient(circle at 15% 10%, rgba(106, 148, 255, 0.22), transparent 34%),
      radial-gradient(circle at 88% 20%, rgba(255, 181, 84, 0.18), transparent 30%),
      rgba(10, 12, 24, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 22px;
    overflow: hidden;
  }
  .layout {
    position: relative;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 1px 360px;
    gap: 18px;
    height: 100%;
  }
  .layout::before {
    content: "";
    grid-column: 2;
    grid-row: 1;
    width: 1px;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(
      180deg,
      transparent,
      rgba(125, 155, 255, 0.14) 12%,
      rgba(255, 255, 255, 0.46) 48%,
      rgba(255, 188, 101, 0.18) 88%,
      transparent
    );
    box-shadow: 0 0 18px rgba(125, 155, 255, 0.18);
  }
  .panel-section {
    min-height: 0;
  }
  .main {
    grid-column: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    padding: 18px 18px 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 0.03em;
  }
  .sub {
    margin-top: 6px;
    font-size: 12px;
    color: rgba(247, 248, 255, 0.54);
  }
  .count {
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(123, 153, 255, 0.14);
    color: rgba(198, 211, 255, 0.92);
    font-size: 12px;
    white-space: nowrap;
  }
  .search-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 96px;
    gap: 10px;
  }
  input {
    width: 100%;
    height: 40px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    background: rgba(4, 6, 14, 0.46);
    color: #fff;
    outline: none;
    padding: 0 12px;
    font-size: 13px;
  }
  input:focus {
    border-color: rgba(142, 170, 255, 0.72);
    box-shadow: 0 0 0 3px rgba(112, 145, 255, 0.14);
  }
  button {
    height: 40px;
    border: 0;
    border-radius: 12px;
    color: #fff;
    background: linear-gradient(135deg, #6387ff, #8d66ff);
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.14s ease, opacity 0.14s ease;
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled {
    cursor: not-allowed;
    opacity: 0.45;
    transform: none;
  }
  .ghost {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.72);
  }
  .danger {
    background: linear-gradient(135deg, #ff6b6b, #ff9e66);
  }
  .list {
    min-height: 0;
    overflow-y: auto;
    padding: 10px;
  }
  .list::-webkit-scrollbar { width: 6px; }
  .list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.16);
    border-radius: 999px;
  }
  .row {
    display: grid;
    grid-template-columns: 40px 42px minmax(0, 1fr) 88px;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: 14px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .row:hover { background: rgba(255, 255, 255, 0.055); }
  .row.active {
    background: rgba(111, 142, 255, 0.16);
    border-color: rgba(144, 169, 255, 0.34);
  }
  .rank {
    text-align: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.42);
    font-weight: 700;
  }
  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.11);
    color: rgba(255, 255, 255, 0.7);
    font-weight: 800;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .name {
    min-width: 0;
    font-size: 14px;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .uid {
    margin-top: 4px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.38);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .points {
    text-align: right;
    font-size: 16px;
    font-weight: 800;
    color: #ffd878;
  }
  .side {
    grid-column: 3;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .selected {
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .selected-head {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .selected-head .avatar {
    width: 54px;
    height: 54px;
  }
  .selected-name {
    font-size: 17px;
    font-weight: 800;
  }
  .selected-id {
    margin-top: 4px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.44);
    word-break: break-all;
  }
  .metric {
    margin-top: 14px;
    padding: 14px;
    border-radius: 14px;
    background: rgba(255, 216, 120, 0.1);
    color: #ffd878;
    font-size: 26px;
    font-weight: 900;
  }
  .label {
    margin-bottom: 7px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.56);
    font-weight: 700;
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .hint {
    margin-top: auto;
    font-size: 12px;
    line-height: 1.65;
    color: rgba(255, 255, 255, 0.42);
  }
  .notice {
    min-height: 36px;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.07);
    color: rgba(255, 255, 255, 0.74);
    font-size: 12px;
    line-height: 1.45;
  }
  .notice.ok {
    background: rgba(80, 220, 150, 0.12);
    color: #9ff0c3;
  }
  .notice.err {
    background: rgba(255, 95, 95, 0.13);
    color: #ffb5b5;
  }
  .empty {
    padding: 50px 20px;
    text-align: center;
    color: rgba(255, 255, 255, 0.38);
    font-size: 13px;
  }
  @media (max-width: 760px) {
    .layout {
      grid-template-columns: 1fr;
      gap: 18px;
      overflow-y: auto;
    }
    .layout::before {
      grid-column: 1;
      grid-row: 2;
      width: 100%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(125, 155, 255, 0.18),
        rgba(255, 255, 255, 0.42),
        rgba(255, 188, 101, 0.18),
        transparent
      );
    }
    .main,
    .side {
      grid-column: 1;
    }
    .side { min-height: 320px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="layout">
    <section class="panel-section main">
      <div class="header">
        <div class="title-row">
          <div>
            <h1>积分管理</h1>
            <div class="sub">选择用户后，可在右侧添加或减少积分。每次操作都会二次确认。</div>
          </div>
          <div class="count" id="count">0 人</div>
        </div>
        <div class="search-row">
          <input id="searchInput" placeholder="输入用户昵称搜索，也可粘贴用户 ID">
          <button id="searchBtn">查找</button>
        </div>
      </div>
      <div class="list" id="list">
        <div class="empty">等待积分清单...</div>
      </div>
    </section>

    <aside class="panel-section side">
      <div class="selected" id="selectedBox">
        <div class="empty">请先从左侧清单选择用户，或用昵称/ID 搜索。</div>
      </div>

      <div>
        <div class="label">变动积分</div>
        <input id="amountInput" type="number" min="1" step="1" placeholder="例如：50">
      </div>

      <div class="actions">
        <button id="addBtn">添加积分</button>
        <button class="danger" id="reduceBtn">减少积分</button>
      </div>

      <button class="ghost" id="refreshBtn">刷新清单</button>
      <div class="notice" id="notice">操作记录会即时返回结果，并刷新积分清单。</div>
      <div class="hint">提示：搜索昵称支持模糊匹配；如果粘贴用户 ID，会按 ID 精确匹配。若用户存在但还没有积分记录，第一次添加或减少积分会自动创建积分记录。</div>
    </aside>
  </div>
</div>

<script>
  var users = [];
  var allUsers = [];
  var selectedUserId = "";
  var isBusy = false;

  var listEl = document.getElementById("list");
  var countEl = document.getElementById("count");
  var selectedBox = document.getElementById("selectedBox");
  var noticeEl = document.getElementById("notice");
  var searchInput = document.getElementById("searchInput");
  var amountInput = document.getElementById("amountInput");
  var addBtn = document.getElementById("addBtn");
  var reduceBtn = document.getElementById("reduceBtn");

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function getInitial(name) {
    return name && name !== "未知用户" ? name.charAt(0).toUpperCase() : "?";
  }

  function avatarHtml(user) {
    var initial = escapeHtml(getInitial(user.name));
    if (!user.profilePhoto) {
      return initial;
    }
    return '<img src="' + escapeHtml(user.profilePhoto) + '" alt="' + initial + '" onerror="this.remove()">' + initial;
  }

  function setBusy(nextBusy) {
    isBusy = nextBusy;
    addBtn.disabled = nextBusy;
    reduceBtn.disabled = nextBusy;
    document.getElementById("searchBtn").disabled = nextBusy;
    document.getElementById("refreshBtn").disabled = nextBusy;
  }

  function showNotice(message, kind) {
    noticeEl.className = "notice" + (kind ? " " + kind : "");
    noticeEl.textContent = message || "";
  }

  function post(action, payload) {
    window.parent.postMessage(Object.assign({ action: action }, payload || {}), "*");
  }

  function findSelectedUser() {
    return allUsers.find(function(user) { return user.userId === selectedUserId; })
      || users.find(function(user) { return user.userId === selectedUserId; })
      || null;
  }

  function selectUser(userId) {
    selectedUserId = userId || "";
    post("selectUser", { userId: selectedUserId });
    renderList();
    renderSelected();
  }

  function renderList() {
    countEl.textContent = users.length + " 人";
    if (!users.length) {
      listEl.innerHTML = '<div class="empty">暂无积分记录</div>';
      return;
    }

    listEl.innerHTML = users.map(function(user) {
      var active = user.userId === selectedUserId ? " active" : "";
      var rank = user.rank ? "#" + user.rank : "-";
      return '<div class="row' + active + '" data-user-id="' + escapeHtml(user.userId) + '">'
        + '<div class="rank">' + escapeHtml(rank) + '</div>'
        + '<div class="avatar">' + avatarHtml(user) + '</div>'
        + '<div>'
        + '<div class="name">' + escapeHtml(user.name || "未知用户") + '</div>'
        + '<div class="uid">' + escapeHtml(user.userId) + '</div>'
        + '</div>'
        + '<div class="points">' + escapeHtml(user.points || 0) + '</div>'
        + '</div>';
    }).join("");

    Array.prototype.forEach.call(listEl.querySelectorAll(".row"), function(row) {
      row.addEventListener("click", function() {
        selectUser(row.getAttribute("data-user-id"));
      });
    });
  }

  function renderSelected() {
    var user = findSelectedUser();
    if (!user) {
      selectedBox.innerHTML = '<div class="empty">请先从左侧清单选择用户，或用昵称/ID 搜索。</div>';
      return;
    }

    selectedBox.innerHTML =
      '<div class="selected-head">'
      + '<div class="avatar">' + avatarHtml(user) + '</div>'
      + '<div>'
      + '<div class="selected-name">' + escapeHtml(user.name || "未知用户") + '</div>'
      + '<div class="selected-id">' + escapeHtml(user.userId) + '</div>'
      + '</div>'
      + '</div>'
      + '<div class="metric">' + escapeHtml(user.points || 0) + ' pts</div>';
  }

  function applyUsers(nextUsers, nextSelectedUserId) {
    allUsers = Array.isArray(nextUsers) ? nextUsers : [];
    users = allUsers.slice();
    if (nextSelectedUserId) {
      selectedUserId = nextSelectedUserId;
    } else if (selectedUserId && !allUsers.some(function(user) { return user.userId === selectedUserId; })) {
      selectedUserId = "";
    }
    renderList();
    renderSelected();
  }

  function applySearchResults(searchUsers, nextSelectedUserId) {
    users = Array.isArray(searchUsers) ? searchUsers : [];
    users.forEach(function(searchUser) {
      var index = allUsers.findIndex(function(user) { return user.userId === searchUser.userId; });
      if (index >= 0) {
        allUsers[index] = Object.assign({}, allUsers[index], searchUser);
      } else {
        allUsers.unshift(searchUser);
      }
    });
    if (nextSelectedUserId) {
      selectedUserId = nextSelectedUserId;
    }
    renderList();
    renderSelected();
  }

  function handleSearch() {
    var searchTerm = searchInput.value.trim();
    if (!searchTerm) {
      users = allUsers.slice();
      renderList();
      renderSelected();
      showNotice("已清除搜索，显示完整积分清单。", "ok");
      return;
    }
    post("searchUser", { searchTerm: searchTerm });
  }

  function handleAdjust(direction) {
    var user = findSelectedUser();
    var amount = Math.trunc(Number(amountInput.value));
    if (!user) {
      showNotice("请先选择用户。", "err");
      return;
    }
    if (!Number.isFinite(amount) || amount <= 0) {
      showNotice("请输入大于 0 的积分数量。", "err");
      return;
    }

    var delta = direction === "add" ? amount : -amount;
    var label = direction === "add" ? "添加" : "减少";
    var ok = window.confirm(
      "确认要给用户 " + (user.name || user.userId) + " " + label + " " + amount + " 积分吗？\n\n当前积分：" + (user.points || 0)
    );
    if (!ok) {
      return;
    }

    post("adjustPoints", {
      userId: user.userId,
      delta: delta
    });
  }

  document.getElementById("searchBtn").addEventListener("click", handleSearch);
  searchInput.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      handleSearch();
    }
  });
  addBtn.addEventListener("click", function() { handleAdjust("add"); });
  reduceBtn.addEventListener("click", function() { handleAdjust("reduce"); });
  document.getElementById("refreshBtn").addEventListener("click", function() {
    searchInput.value = "";
    post("refresh");
  });

  window.addEventListener("message", function(event) {
    var data = event.data || {};
    if (data.type === "POINTS_ADMIN_LOADING") {
      setBusy(true);
      listEl.innerHTML = '<div class="empty">' + escapeHtml(data.message || "加载中...") + '</div>';
      showNotice(data.message || "加载中...");
    } else if (data.type === "POINTS_ADMIN_DATA") {
      setBusy(false);
      applyUsers(data.users, data.selectedUserId);
      showNotice("积分清单已更新。", "ok");
    } else if (data.type === "POINTS_ADMIN_SEARCH_RESULTS") {
      setBusy(false);
      applySearchResults(data.users, data.selectedUserId);
      var searchCount = data.searchCount || 0;
      var message = searchCount > 0
        ? "搜索完成，共匹配 " + searchCount + " 人。请从左侧列表选择要操作的用户。"
        : (data.message || "没有匹配的用户。");
      showNotice(message, searchCount > 0 ? "ok" : "err");
    } else if (data.type === "POINTS_ADMIN_ERROR") {
      setBusy(false);
      listEl.innerHTML = '<div class="empty">' + escapeHtml(data.message || "加载失败") + '</div>';
      showNotice(data.message || "加载失败", "err");
    } else if (data.type === "POINTS_ADMIN_NOTICE") {
      setBusy(false);
      showNotice(data.message || "", data.success ? "ok" : "err");
    } else if (data.type === "POINTS_ADMIN_SEARCHING") {
      setBusy(true);
      showNotice("正在查找用户...");
    } else if (data.type === "POINTS_ADMIN_OPERATION_PENDING") {
      setBusy(true);
      showNotice("正在更新积分...");
    } else if (data.type === "POINTS_ADMIN_OPERATION_RESULT") {
      setBusy(false);
      if (Array.isArray(data.users)) {
        applyUsers(data.users, data.selectedUserId);
      }
      showNotice(data.message || (data.success ? "操作成功" : "操作失败"), data.success ? "ok" : "err");
      if (data.success) {
        amountInput.value = "";
      }
    }
  });

  post("ready");
</script>
</body>
</html>
