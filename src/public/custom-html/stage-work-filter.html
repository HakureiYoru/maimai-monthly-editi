<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>主会场作品筛选</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Arial Black", Arial, "Microsoft YaHei", sans-serif;
      background: transparent;
      color: #fff;
      overflow: hidden;
    }

    .filter-bar {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      gap: 22px;
      padding: 10px 14px;
      background: transparent;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field-label {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 160px;
    }

    input,
    select,
    button {
      height: 48px;
      border: 0;
      border-radius: 4px;
      background: linear-gradient(90deg, rgba(131, 151, 194, 0.78), rgba(174, 186, 211, 0.52));
      color: #fff;
      font-family: "Arial Black", Arial, "Microsoft YaHei", sans-serif;
      font-size: 20px;
      font-weight: 900;
      outline: none;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(12px);
    }

    input {
      width: 100%;
      padding: 0 48px 0 18px;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.55);
    }

    input:focus,
    select:focus,
    button:focus {
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.24), 0 8px 22px rgba(0, 0, 0, 0.18);
    }

    select {
      min-width: 244px;
      padding: 0 44px 0 18px;
      cursor: pointer;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #fff 50%),
        linear-gradient(135deg, #fff 50%, transparent 50%),
        linear-gradient(90deg, rgba(131, 151, 194, 0.78), rgba(174, 186, 211, 0.52));
      background-position:
        calc(100% - 23px) 21px,
        calc(100% - 18px) 21px,
        0 0;
      background-size:
        5px 5px,
        5px 5px,
        100% 100%;
      background-repeat: no-repeat;
    }

    select option {
      color: #111;
    }

    button {
      min-width: 38px;
      padding: 0 18px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    button:hover {
      background: linear-gradient(90deg, rgba(146, 165, 207, 0.86), rgba(190, 201, 224, 0.62));
    }

    .clear-btn {
      position: absolute;
      top: 50%;
      right: 8px;
      min-width: 34px;
      width: 34px;
      height: 34px;
      padding: 0;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.72);
      font-size: 18px;
      line-height: 1;
    }

    .clear-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .meta {
      min-width: 86px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 20px;
      text-align: right;
      white-space: nowrap;
    }

    .meta.loading {
      color: #ffd966;
    }

    .loading-status {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 126px;
      height: 48px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 20px;
      white-space: nowrap;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.28);
      border-top-color: #fff;
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.2s ease, transform 0.2s ease;
      animation: spin 0.8s linear infinite;
    }

    .loading-status.is-loading .spinner {
      opacity: 1;
      transform: scale(1);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 520px) {
      .filter-bar {
        flex-wrap: wrap;
        gap: 14px;
        padding: 8px 10px;
      }

      .field,
      .search-wrap {
        width: 100%;
      }

      select {
        width: 100%;
        flex: 1;
      }

      .meta {
        width: 100%;
        text-align: left;
      }

      .loading-status {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="filter-bar">
    <div class="field search-wrap">
      <label class="field-label" for="searchInput">搜索作品</label>
      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="作品名 / 作品 ID" autocomplete="off" />
        <button id="clearBtn" class="clear-btn" type="button" aria-label="清空搜索">×</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="sortSelect">排序方法</label>
      <select id="sortSelect" aria-label="作品排序">
        <option value="default">Default / 默认</option>
        <option value="rating">Tier / 档位</option>
        <option value="task">Tasks Only / 仅任务</option>
      </select>
    </div>

    <button id="refreshBtn" type="button">刷新</button>
    <div id="loadingStatus" class="loading-status">
      <span class="spinner" aria-hidden="true"></span>
      <span id="meta" class="meta">准备就绪</span>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    const clearBtn = document.getElementById('clearBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const loadingStatus = document.getElementById('loadingStatus');
    const meta = document.getElementById('meta');

    let searchTimer = null;
    let isApplyingState = false;
    let currentState = {
      searchValue: '',
      sortMode: 'default',
      totalItems: null,
      currentPage: 1,
      totalPages: 1,
      isLoading: false,
    };

    function postFilterChange() {
      window.parent.postMessage({
        type: 'WORK_LIST_FILTER_CHANGED',
        data: {
          searchValue: searchInput.value.trim(),
          sortMode: sortSelect.value || 'default',
        },
      }, '*');
    }

    function scheduleFilterChange() {
      if (isApplyingState) {
        return;
      }

      clearTimeout(searchTimer);
      searchTimer = setTimeout(postFilterChange, 300);
    }

    function updateMeta() {
      meta.classList.toggle('loading', !!currentState.isLoading);
      loadingStatus.classList.toggle('is-loading', !!currentState.isLoading);

      if (currentState.isLoading) {
        meta.textContent = '加载中...';
        return;
      }

      if (typeof currentState.totalItems === 'number') {
        meta.textContent = `${currentState.totalItems} 个作品`;
        return;
      }

      meta.textContent = '准备就绪';
    }

    function applyState(data) {
      currentState = {
        ...currentState,
        ...data,
      };

      isApplyingState = true;
      searchInput.value = currentState.searchValue || '';
      sortSelect.value = currentState.sortMode || 'default';
      isApplyingState = false;

      updateMeta();
    }

    searchInput.addEventListener('input', scheduleFilterChange);

    sortSelect.addEventListener('change', () => {
      if (!isApplyingState) {
        postFilterChange();
      }
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      postFilterChange();
      searchInput.focus();
    });

    refreshBtn.addEventListener('click', postFilterChange);

    window.addEventListener('message', (event) => {
      const message = event.data || {};

      if (message.type === 'WORK_LIST_FILTER_STATE') {
        applyState(message.data || {});
      }
    });

    window.addEventListener('load', () => {
      window.parent.postMessage({ type: 'WORK_LIST_FILTER_READY' }, '*');
    });
  </script>
</body>
</html>
