<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检举审核处</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: rgba(0, 0, 0, 0);
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            background: rgba(42, 42, 42, 0.92);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 2px solid #555;
            flex-shrink: 0;
        }

        .header h2 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
        }

        .search-filter-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-input {
            flex: 1;
            padding: 10px 15px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #777;
            background: #3a3a3a;
        }

        .search-input::placeholder {
            color: #888;
        }

        .search-btn {
            padding: 10px 25px;
            background: #555;
            color: #fff;
            border: 1px solid #666;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-btn:hover {
            background: #666;
            border-color: #777;
        }

        .filters-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-label {
            font-size: 12px;
            color: #999;
            padding-left: 5px;
        }

        .filter-select {
            padding: 8px 12px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-select:focus {
            outline: none;
            border-color: #777;
            background: #3a3a3a;
        }

        .filter-select option {
            background: #333;
            color: #fff;
        }

        .clear-filters-btn {
            padding: 8px 20px;
            background: #444;
            color: #ccc;
            border: 1px solid #555;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .clear-filters-btn:hover {
            background: #555;
            border-color: #666;
        }

        @media (max-width: 768px) {
            .filters-box {
                grid-template-columns: 1fr;
            }
        }

        .records-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .record-item {
            background: #333;
            border-left: 3px solid #666;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .record-item:hover {
            background: #3a3a3a;
            border-left-color: #888;
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }

        .work-number {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }

        .report-time {
            font-size: 12px;
            color: #888;
        }

        .record-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .info-item {
            font-size: 13px;
            color: #ccc;
            line-height: 1.6;
        }

        .info-label {
            color: #888;
            margin-right: 5px;
        }

        .reason-box {
            background: #2a2a2a;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-size: 13px;
            color: #ddd;
            line-height: 1.5;
        }

        .process-box {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #ddd;
        }

        .public-note-box {
            margin-top: 12px;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
        }

        .public-note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .public-note-status {
            font-size: 12px;
            color: #888;
        }

        .public-note-textarea {
            width: 100%;
            min-height: 82px;
            resize: vertical;
            padding: 10px;
            background: #202020;
            border: 1px solid #555;
            color: #fff;
            font-size: 13px;
            line-height: 1.5;
        }

        .public-note-textarea:focus {
            outline: none;
            border-color: #777;
        }

        .public-note-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .note-save-btn {
            padding: 8px 18px;
            background: #555;
            color: #fff;
            border: 1px solid #666;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .note-save-btn:hover:not(:disabled) {
            background: #666;
            border-color: #777;
        }

        .note-save-btn:disabled,
        .public-note-textarea:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .process-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .view-btn {
            background: #555;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 20px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .view-btn:hover {
            background: #666;
            border-color: #777;
        }

        .comment-content {
            background: #2a2a2a;
            padding: 15px;
            margin-top: 10px;
            border-radius: 4px;
            font-size: 13px;
            color: #ddd;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            border: 1px solid #444;
        }

        .comment-content.show {
            display: block;
        }

        .comment-content::-webkit-scrollbar {
            width: 6px;
        }

        .comment-content::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .comment-content::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #ccc;
            font-size: 14px;
        }

        .no-records {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 14px;
        }

        .status-message {
            text-align: center;
            padding: 15px;
            margin: 10px 20px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }

        .status-message.error {
            background: #4a2a2a;
            border-color: #7a4a4a;
            color: #cf8f8f;
        }

        .status-message.success {
            background: #294a2a;
            border-color: #4a7a4a;
            color: #9fd39f;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #2a2a2a;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>检举审核处</h2>
            <div class="search-filter-container">
                <div class="search-box">
                    <input
                        type="text"
                        class="search-input"
                        id="searchInput"
                        placeholder="搜索作品编号、检举理由或评论内容..."
                    />
                    <button class="search-btn" id="searchBtn">搜索</button>
                </div>
                <div class="filters-box">
                    <div class="filter-group">
                        <label class="filter-label">原评论用户</label>
                        <select class="filter-select" id="userFilter">
                            <option value="">全部用户</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">检举人</label>
                        <select class="filter-select" id="reporterFilter">
                            <option value="">全部检举人</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">作品编号</label>
                        <select class="filter-select" id="workFilter">
                            <option value="">全部作品</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">处理状态</label>
                        <select class="filter-select" id="processedFilter">
                            <option value="">全部</option>
                            <option value="processed">已处理</option>
                            <option value="unprocessed">未处理</option>
                        </select>
                    </div>
                </div>
                <button class="clear-filters-btn" id="clearFiltersBtn">清除所有筛选</button>
            </div>
        </div>

        <div class="status-message" id="statusMessage"></div>

        <div class="records-container" id="recordsContainer">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        let allRecords = [];
        let userCache = {};
        let workTitleCache = {};
        let pendingUpdates = new Map();
        let noteStates = new Map();
        let currentFilters = {
            search: '',
            user: '',
            reporter: '',
            work: '',
            processed: ''
        };
        const RECORD_RENDER_CHUNK_SIZE = 12;
        let activeRenderToken = 0;
        let activeFilterRun = 0;
        let pendingUserRequests = new Map();
        let pendingWorkTitleRequests = new Map();
        const USER_DISPLAY_TEXT = {
            loading: '加载中...',
            guest: '访客',
            invalid: '失效账号',
            unknown: '未知用户'
        };

        window.addEventListener('message', async (event) => {
            const data = event.data;

            if (data.action === 'init') {
                allRecords = hydrateRecords(data.records || []);
                initializeFilters();
                await applyFilters();
            } else if (data.action === 'recordsRefresh') {
                handleRecordsRefresh(data.records || []);
            } else if (data.action === 'userInfo') {
                if (hasUsableUserId(data.userId) && Object.prototype.hasOwnProperty.call(data, 'userName')) {
                    userCache[data.userId] = resolveUserDisplayName(data.userId, data.userName);
                    refreshRenderedUserNames(data.userId);
                    refreshUserFilterOptions(data.userId);
                }
            } else if (data.action === 'workTitle') {
                if (data.workNumber && data.workTitle) {
                    workTitleCache[data.workNumber] = data.workTitle;
                    refreshRenderedWorkTitles(data.workNumber);
                    refreshWorkFilterOptions(data.workNumber);
                }
            } else if (data.action === 'updateProcessedResult') {
                handleProcessedUpdateResult(data);
            } else if (data.action === 'savePublicNoteResult') {
                handlePublicNoteSaveResult(data);
            }
        });

        function hydrateRecords(records) {
            return records.map(record => {
                const hydratedRecord = {
                    ...record,
                    publicNote: normalizeNote(record.publicNote),
                    publicNoteUpdatedAt: record.publicNoteUpdatedAt || ''
                };
                syncNoteStateFromRecord(hydratedRecord);
                return hydratedRecord;
            });
        }

        function normalizeNote(value) {
            return value == null ? '' : String(value);
        }

        function getOrCreateNoteState(recordId, noteValue = '', updatedAt = '') {
            if (!noteStates.has(recordId)) {
                const savedValue = normalizeNote(noteValue);
                noteStates.set(recordId, {
                    savedValue: savedValue,
                    currentValue: savedValue,
                    savedUpdatedAt: updatedAt || '',
                    dirty: false,
                    isSaving: false
                });
            }

            return noteStates.get(recordId);
        }

        function syncNoteStateFromRecord(record) {
            if (!record || !record._id) {
                return;
            }

            const state = getOrCreateNoteState(record._id, record.publicNote, record.publicNoteUpdatedAt);
            if (state.dirty || state.isSaving) {
                return;
            }

            state.savedValue = normalizeNote(record.publicNote);
            state.currentValue = state.savedValue;
            state.savedUpdatedAt = record.publicNoteUpdatedAt || '';
            state.dirty = false;
        }

        function updateRecordInStore(recordId, updater) {
            allRecords = allRecords.map(record => {
                if (record._id !== recordId) {
                    return record;
                }
                return updater(record);
            });
        }

        function getNoteStatusText(state) {
            if (!state || !state.savedValue) {
                return '暂无备注';
            }

            if (!state.savedUpdatedAt) {
                return '备注已保存';
            }

            return `上次更新: ${formatDateTime(state.savedUpdatedAt)}`;
        }

        function formatDateTime(value) {
            const date = value ? new Date(value) : null;
            if (!date || isNaN(date.getTime())) {
                return '未知时间';
            }

            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function renderNoteState(recordId, root = document) {
            const state = noteStates.get(recordId);
            if (!state) {
                return;
            }

            const textarea = root.querySelector(`.public-note-textarea[data-record-id="${recordId}"]`);
            const saveBtn = root.querySelector(`.note-save-btn[data-record-id="${recordId}"]`);
            const statusEl = root.querySelector(`.public-note-status[data-record-id="${recordId}"]`);

            if (!textarea || !saveBtn || !statusEl) {
                return;
            }

            if (textarea.value !== state.currentValue && (document.activeElement !== textarea || !state.dirty)) {
                textarea.value = state.currentValue;
            }

            textarea.disabled = state.isSaving;
            saveBtn.disabled = !state.dirty || state.isSaving;
            saveBtn.textContent = state.isSaving ? '保存中...' : '保存备注';
            statusEl.textContent = state.dirty ? '有未保存修改' : getNoteStatusText(state);
        }

        function updateProcessedUi(record) {
            if (!record || !record._id || pendingUpdates.has(record._id)) {
                return;
            }

            const checkbox = document.querySelector(`.process-checkbox[data-record-id="${record._id}"]`);
            const processedByEl = document.querySelector(`.processed-by[data-record-id="${record._id}"]`);
            const processed = record.processed === true;

            if (checkbox) {
                checkbox.checked = processed;
                checkbox.disabled = processed;
            }

            if (processedByEl) {
                processedByEl.textContent = processed ? (record.processedByName || '未知') : '未处理';
            }
        }

        function handlePublicNoteInput(recordId, nextValue) {
            const state = getOrCreateNoteState(recordId);
            state.currentValue = nextValue;
            state.dirty = nextValue !== state.savedValue;

            updateRecordInStore(recordId, record => ({
                ...record,
                publicNote: nextValue
            }));

            renderNoteState(recordId);
        }

        function savePublicNote(recordId) {
            const state = noteStates.get(recordId);
            if (!state || !state.dirty || state.isSaving) {
                return;
            }

            state.isSaving = true;
            renderNoteState(recordId);

            window.parent.postMessage({
                action: 'savePublicNote',
                recordId: recordId,
                publicNote: state.currentValue
            }, '*');
        }

        function handlePublicNoteSaveResult(data) {
            const recordId = data.recordId;
            const state = noteStates.get(recordId);

            if (!recordId || !state) {
                return;
            }

            state.isSaving = false;

            if (data.success !== true) {
                state.dirty = state.currentValue !== state.savedValue;
                renderNoteState(recordId);
                showMessage(`备注保存失败: ${data.message || '未知错误'}`, 'error');
                return;
            }

            state.savedValue = normalizeNote(data.publicNote);
            state.currentValue = state.savedValue;
            state.savedUpdatedAt = data.publicNoteUpdatedAt || '';
            state.dirty = false;

            updateRecordInStore(recordId, record => ({
                ...record,
                publicNote: state.savedValue,
                publicNoteUpdatedAt: state.savedUpdatedAt
            }));

            renderNoteState(recordId);
            showMessage('备注已保存', 'success');
        }

        function handleRecordsRefresh(records) {
            const incomingRecords = records.map(record => ({
                ...record,
                publicNote: normalizeNote(record.publicNote),
                publicNoteUpdatedAt: record.publicNoteUpdatedAt || ''
            }));

            allRecords = incomingRecords.map(record => {
                const state = getOrCreateNoteState(record._id, record.publicNote, record.publicNoteUpdatedAt);

                if (!state.dirty && !state.isSaving) {
                    state.savedValue = record.publicNote;
                    state.currentValue = record.publicNote;
                    state.savedUpdatedAt = record.publicNoteUpdatedAt;
                    state.dirty = false;
                    renderNoteState(record._id);
                }

                updateProcessedUi(record);

                return {
                    ...record,
                    publicNote: state.dirty || state.isSaving ? state.currentValue : record.publicNote,
                    publicNoteUpdatedAt: state.dirty || state.isSaving ? state.savedUpdatedAt : record.publicNoteUpdatedAt
                };
            });
        }

        function initializeFilters() {
            const userSet = new Set();
            const reporterSet = new Set();
            const workSet = new Set();

            for (const record of allRecords) {
                if (record.originalCommentOwner) {
                    userSet.add(record.originalCommentOwner);
                }
                if (record.reportedBy) {
                    reporterSet.add(record.reportedBy);
                }
                if (record.workNumber) {
                    workSet.add(record.workNumber);
                }
            }

            populateUserFilterOptions(
                document.getElementById('userFilter'),
                Array.from(userSet).sort(),
                '全部用户',
                currentFilters.user
            );

            populateUserFilterOptions(
                document.getElementById('reporterFilter'),
                Array.from(reporterSet).sort(),
                '全部检举人',
                currentFilters.reporter
            );

            populateWorkFilterOptions(
                document.getElementById('workFilter'),
                Array.from(workSet).sort((a, b) => a - b),
                currentFilters.work
            );
        }

        async function applyFilters() {
            const filterRunId = ++activeFilterRun;
            let filteredRecords = [...allRecords];

            if (currentFilters.search) {
                const searchLower = currentFilters.search.toLowerCase();
                filteredRecords = filteredRecords.filter(record => {
                    const workNumber = String(record.workNumber || '').toLowerCase();
                    const reportReason = String(record.reportReason || '').toLowerCase();
                    const reportedComment = String(record.reportedComment || '').toLowerCase();

                    return workNumber.includes(searchLower) ||
                           reportReason.includes(searchLower) ||
                           reportedComment.includes(searchLower);
                });
            }

            if (currentFilters.user) {
                filteredRecords = filteredRecords.filter(record =>
                    record.originalCommentOwner === currentFilters.user
                );
            }

            if (currentFilters.reporter) {
                filteredRecords = filteredRecords.filter(record =>
                    record.reportedBy === currentFilters.reporter
                );
            }

            if (currentFilters.work) {
                filteredRecords = filteredRecords.filter(record =>
                    String(record.workNumber) === String(currentFilters.work)
                );
            }

            if (currentFilters.processed === 'processed') {
                filteredRecords = filteredRecords.filter(record => record.processed === true);
            } else if (currentFilters.processed === 'unprocessed') {
                filteredRecords = filteredRecords.filter(record => record.processed !== true);
            }

            await displayRecords(filteredRecords);

            if (filterRunId !== activeFilterRun) {
                return;
            }

            const activeFiltersCount = Object.values(currentFilters).filter(v => v).length;
            if (activeFiltersCount > 0 && filteredRecords.length === 0) {
                showMessage('没有符合筛选条件的记录', 'error');
            }
        }

        async function displayRecords(records) {
            const container = document.getElementById('recordsContainer');
            const renderToken = ++activeRenderToken;

            if (records.length === 0) {
                container.innerHTML = '<div class="no-records">暂无检举记录</div>';
                return;
            }

            container.innerHTML = '';

            for (let index = 0; index < records.length; index += RECORD_RENDER_CHUNK_SIZE) {
                if (renderToken !== activeRenderToken) {
                    return;
                }

                const fragment = document.createDocumentFragment();
                const chunk = records.slice(index, index + RECORD_RENDER_CHUNK_SIZE);

                for (const record of chunk) {
                    const recordElement = createRecordElement(record);
                    fragment.appendChild(recordElement);
                    hydrateRecordElement(record, recordElement, renderToken);
                }

                container.appendChild(fragment);

                if (index + RECORD_RENDER_CHUNK_SIZE < records.length) {
                    await nextPaint();
                }
            }
        }

        function createRecordElement(record) {
            const div = document.createElement('div');
            div.className = 'record-item';

            const reportDate = record.reportedAt ? new Date(record.reportedAt) : null;
            const formattedDate = reportDate && !isNaN(reportDate.getTime())
                ? `${reportDate.getFullYear()}-${String(reportDate.getMonth() + 1).padStart(2, '0')}-${String(reportDate.getDate()).padStart(2, '0')} ${String(reportDate.getHours()).padStart(2, '0')}:${String(reportDate.getMinutes()).padStart(2, '0')}`
                : '未知时间';

            const processed = record.processed === true;
            const processedByName = record.processedByName || '';
            const noteState = getOrCreateNoteState(record._id, record.publicNote, record.publicNoteUpdatedAt);

            div.innerHTML = `
                <div class="record-header">
                    <div class="work-number work-title">#${record.workNumber} - ${escapeHtml(getCachedWorkTitle(record.workNumber))}</div>
                    <div class="report-time">${formattedDate}</div>
                </div>
                <div class="record-info">
                    <div class="info-item">
                        <span class="info-label">原评论用户:</span>
                        <strong class="user-name original-user-name">${escapeHtml(getCachedUserNickname(record.originalCommentOwner))}</strong>
                    </div>
                    <div class="info-item">
                        <span class="info-label">检举人:</span>
                        <strong class="user-name reporter-user-name">${escapeHtml(getCachedUserNickname(record.reportedBy))}</strong>
                    </div>
                    <div class="info-item">
                        <span class="info-label">处理人:</span>
                        <strong class="processed-by" data-record-id="${record._id}">${processed ? escapeHtml(processedByName || '未知') : '未处理'}</strong>
                    </div>
                </div>
                <div class="reason-box">
                    <span class="info-label">检举理由:</span>
                    ${escapeHtml(record.reportReason || '未填写')}
                </div>
                <div class="process-box">
                    <label>
                        <input class="process-checkbox" type="checkbox" data-record-id="${record._id}" ${processed ? 'checked disabled' : ''} />
                        是否已处理
                    </label>
                </div>
                <div class="public-note-box">
                    <div class="public-note-header">
                        <span class="info-label">备注</span>
                        <span class="public-note-status" data-record-id="${record._id}">${escapeHtml(getNoteStatusText(noteState))}</span>
                    </div>
                    <textarea class="public-note-textarea" data-record-id="${record._id}" placeholder="填写审核公共备注，其他审核员也可继续编辑"></textarea>
                    <div class="public-note-actions">
                        <button class="note-save-btn" type="button" data-record-id="${record._id}" disabled>保存备注</button>
                    </div>
                </div>
                <button class="view-btn">查看评论内容</button>
                <div class="comment-content">
                    ${escapeHtml(record.reportedComment || '评论内容获取失败').replace(/\\n/g, '<br>')}
                </div>
            `;

            const workTitleEl = div.querySelector('.work-title');
            const originalUserEl = div.querySelector('.original-user-name');
            const reporterUserEl = div.querySelector('.reporter-user-name');
            const viewBtn = div.querySelector('.view-btn');
            const commentContent = div.querySelector('.comment-content');
            const noteTextarea = div.querySelector('.public-note-textarea');
            const noteSaveBtn = div.querySelector('.note-save-btn');

            if (workTitleEl) {
                workTitleEl.dataset.workNumber = String(record.workNumber || '');
            }
            if (originalUserEl) {
                originalUserEl.dataset.userId = String(record.originalCommentOwner || '');
            }
            if (reporterUserEl) {
                reporterUserEl.dataset.userId = String(record.reportedBy || '');
            }

            viewBtn.addEventListener('click', () => {
                commentContent.classList.toggle('show');
                if (commentContent.classList.contains('show')) {
                    viewBtn.textContent = '收起评论内容';
                } else {
                    viewBtn.textContent = '查看评论内容';
                }
            });

            const checkbox = div.querySelector('.process-checkbox');
            checkbox.addEventListener('change', () => {
                const recordId = record._id;
                const nextValue = checkbox.checked;
                const previousValue = record.processed === true;
                pendingUpdates.set(recordId, { previousValue: previousValue });
                checkbox.disabled = true;
                window.parent.postMessage({
                    action: 'updateProcessed',
                    recordId: recordId,
                    processed: nextValue
                }, '*');
            });

            noteTextarea.value = noteState.currentValue;
            noteTextarea.addEventListener('input', () => {
                handlePublicNoteInput(record._id, noteTextarea.value);
            });
            noteSaveBtn.addEventListener('click', () => {
                savePublicNote(record._id);
            });
            renderNoteState(record._id, div);

            return div;
        }

        async function hydrateRecordElement(record, root, renderToken) {
            const [originalUserName, reporterName, workTitle] = await Promise.all([
                getUserNickname(record.originalCommentOwner),
                getUserNickname(record.reportedBy),
                getWorkTitle(record.workNumber)
            ]);

            if (!isRenderCurrent(renderToken, root)) {
                return;
            }

            const workTitleEl = root.querySelector('.work-title');
            const originalUserEl = root.querySelector('.original-user-name');
            const reporterUserEl = root.querySelector('.reporter-user-name');

            if (workTitleEl) {
                workTitleEl.textContent = `#${record.workNumber} - ${workTitle}`;
            }
            if (originalUserEl) {
                originalUserEl.textContent = originalUserName;
            }
            if (reporterUserEl) {
                reporterUserEl.textContent = reporterName;
            }
        }

        async function getUserNickname(userId) {
            if (!hasUsableUserId(userId)) {
                return USER_DISPLAY_TEXT.invalid;
            }

            if (userCache[userId]) {
                return userCache[userId];
            }

            if (!pendingUserRequests.has(userId)) {
                window.parent.postMessage({
                    action: 'getUserInfo',
                    userId: userId
                }, '*');

                pendingUserRequests.set(userId, waitForCacheValue(() => userCache[userId])
                    .finally(() => {
                        pendingUserRequests.delete(userId);
                    }));
            }

            const resolvedName = await pendingUserRequests.get(userId);
            return resolvedName || getUnresolvedUserFallback(userId);
        }

        async function getWorkTitle(workNumber) {
            if (!workNumber && workNumber !== 0) {
                return '未知标题';
            }

            if (workTitleCache[workNumber]) {
                return workTitleCache[workNumber];
            }

            if (!pendingWorkTitleRequests.has(workNumber)) {
                window.parent.postMessage({
                    action: 'getWorkTitle',
                    workNumber: workNumber
                }, '*');

                pendingWorkTitleRequests.set(workNumber, waitForCacheValue(() => workTitleCache[workNumber])
                    .finally(() => {
                        pendingWorkTitleRequests.delete(workNumber);
                    }));
            }

            const resolvedTitle = await pendingWorkTitleRequests.get(workNumber);
            return resolvedTitle || '未知标题';
        }

        function populateUserFilterOptions(filterEl, userIds, defaultLabel, selectedValue) {
            filterEl.innerHTML = `<option value="">${defaultLabel}</option>`;

            for (const userId of userIds) {
                const option = document.createElement('option');
                option.value = userId;
                option.dataset.userId = String(userId);
                option.textContent = getCachedUserNickname(userId);
                filterEl.appendChild(option);

                getUserNickname(userId).then(userName => {
                    if (option.isConnected && option.dataset.userId === String(userId)) {
                        option.textContent = userName;
                    }
                });
            }

            filterEl.value = selectedValue || '';
        }

        function populateWorkFilterOptions(filterEl, workNumbers, selectedValue) {
            filterEl.innerHTML = '<option value="">全部作品</option>';

            for (const workNumber of workNumbers) {
                const option = document.createElement('option');
                option.value = workNumber;
                option.dataset.workNumber = String(workNumber);
                option.textContent = `#${workNumber} - ${getCachedWorkTitle(workNumber)}`;
                filterEl.appendChild(option);

                getWorkTitle(workNumber).then(workTitle => {
                    if (option.isConnected && option.dataset.workNumber === String(workNumber)) {
                        option.textContent = `#${workNumber} - ${workTitle}`;
                    }
                });
            }

            filterEl.value = selectedValue || '';
        }

        function refreshRenderedUserNames(userId) {
            const resolvedName = userCache[userId];
            if (!resolvedName) {
                return;
            }

            document.querySelectorAll('.user-name').forEach(element => {
                if (element.dataset.userId === String(userId)) {
                    element.textContent = resolvedName;
                }
            });
        }

        function refreshRenderedWorkTitles(workNumber) {
            const resolvedTitle = workTitleCache[workNumber];
            if (!resolvedTitle) {
                return;
            }

            document.querySelectorAll('.work-title').forEach(element => {
                if (element.dataset.workNumber === String(workNumber)) {
                    element.textContent = `#${workNumber} - ${resolvedTitle}`;
                }
            });
        }

        function refreshUserFilterOptions(userId) {
            const resolvedName = userCache[userId];
            if (!resolvedName) {
                return;
            }

            document.querySelectorAll('option[data-user-id]').forEach(option => {
                if (option.dataset.userId === String(userId)) {
                    option.textContent = resolvedName;
                }
            });
        }

        function refreshWorkFilterOptions(workNumber) {
            const resolvedTitle = workTitleCache[workNumber];
            if (!resolvedTitle) {
                return;
            }

            document.querySelectorAll('option[data-work-number]').forEach(option => {
                if (option.dataset.workNumber === String(workNumber)) {
                    option.textContent = `#${workNumber} - ${resolvedTitle}`;
                }
            });
        }

        function getCachedUserNickname(userId) {
            if (!hasUsableUserId(userId)) {
                return USER_DISPLAY_TEXT.invalid;
            }
            return userCache[userId] || getPendingUserDisplay(userId);
        }

        function getCachedWorkTitle(workNumber) {
            if (!workNumber && workNumber !== 0) {
                return '未知标题';
            }
            return workTitleCache[workNumber] || '加载中...';
        }

        function waitForCacheValue(getValue, timeout = 2000) {
            return new Promise(resolve => {
                const existingValue = getValue();
                if (existingValue) {
                    resolve(existingValue);
                    return;
                }

                const startTime = Date.now();
                const intervalId = setInterval(() => {
                    const nextValue = getValue();
                    if (nextValue || Date.now() - startTime >= timeout) {
                        clearInterval(intervalId);
                        resolve(nextValue || '');
                    }
                }, 100);
            });
        }

        function hasUsableUserId(userId) {
            return userId !== null && userId !== undefined && String(userId).trim() !== '';
        }

        function isGuestUserId(userId) {
            if (!hasUsableUserId(userId)) {
                return false;
            }

            const normalizedUserId = String(userId).trim().toLowerCase();
            return normalizedUserId === 'guest' ||
                   normalizedUserId === 'visitor' ||
                   normalizedUserId === '游客' ||
                   normalizedUserId === '访客';
        }

        function isGuestUserName(userName) {
            if (typeof userName !== 'string') {
                return false;
            }

            const normalizedUserName = userName.trim().toLowerCase();
            return normalizedUserName === 'guest' ||
                   normalizedUserName === 'guest user' ||
                   normalizedUserName === '游客' ||
                   normalizedUserName === '访客';
        }

        function resolveUserDisplayName(userId, userName) {
            if (!hasUsableUserId(userId)) {
                return USER_DISPLAY_TEXT.invalid;
            }

            if (typeof userName === 'string') {
                const trimmedUserName = userName.trim();
                if (trimmedUserName) {
                    if (trimmedUserName === USER_DISPLAY_TEXT.invalid) {
                        return USER_DISPLAY_TEXT.invalid;
                    }
                    if (isGuestUserName(trimmedUserName) || isGuestUserId(userId)) {
                        return USER_DISPLAY_TEXT.guest;
                    }
                    return trimmedUserName;
                }
            }

            if (isGuestUserId(userId)) {
                return USER_DISPLAY_TEXT.guest;
            }

            return USER_DISPLAY_TEXT.unknown;
        }

        function getPendingUserDisplay(userId) {
            if (!hasUsableUserId(userId)) {
                return USER_DISPLAY_TEXT.invalid;
            }

            if (isGuestUserId(userId)) {
                return USER_DISPLAY_TEXT.guest;
            }

            return USER_DISPLAY_TEXT.loading;
        }

        function getUnresolvedUserFallback(userId) {
            if (!hasUsableUserId(userId)) {
                return USER_DISPLAY_TEXT.invalid;
            }

            if (isGuestUserId(userId)) {
                return USER_DISPLAY_TEXT.guest;
            }

            return USER_DISPLAY_TEXT.unknown;
        }

        function nextPaint() {
            return new Promise(resolve => {
                if (typeof window.requestAnimationFrame === 'function') {
                    window.requestAnimationFrame(() => resolve());
                    return;
                }
                setTimeout(resolve, 0);
            });
        }

        function isRenderCurrent(renderToken, root) {
            return renderToken === activeRenderToken && root && root.isConnected;
        }

        function handleProcessedUpdateResult(data) {
            const recordId = data.recordId;
            const success = data.success === true;

            if (!recordId) {
                return;
            }

            if (!success) {
                const checkbox = document.querySelector(`.process-checkbox[data-record-id="${recordId}"]`);
                const processedByEl = document.querySelector(`.processed-by[data-record-id="${recordId}"]`);
                const processedFromServer = data.processed === true;

                if (processedFromServer) {
                    if (checkbox) {
                        checkbox.checked = true;
                        checkbox.disabled = true;
                    }
                    if (processedByEl) {
                        processedByEl.textContent = data.processedByName || '未知';
                    }
                    allRecords = allRecords.map(record => {
                        if (record._id === recordId) {
                            return {
                                ...record,
                                processed: true,
                                processedByName: data.processedByName || record.processedByName
                            };
                        }
                        return record;
                    });
                } else {
                    const previousState = pendingUpdates.get(recordId);
                    if (checkbox && previousState && typeof previousState.previousValue === 'boolean') {
                        checkbox.checked = previousState.previousValue;
                        checkbox.disabled = false;
                    }
                }

                pendingUpdates.delete(recordId);
                showMessage(`更新失败: ${data.message || '未知错误'}`, 'error');
                return;
            }

            allRecords = allRecords.map(record => {
                if (record._id === recordId) {
                    return {
                        ...record,
                        processed: data.processed === true,
                        processedByName: data.processedByName || record.processedByName
                    };
                }
                return record;
            });
            const processedByEl = document.querySelector(`.processed-by[data-record-id="${recordId}"]`);
            if (processedByEl) {
                processedByEl.textContent = data.processedByName || processedByEl.textContent;
            }
            const checkbox = document.querySelector(`.process-checkbox[data-record-id="${recordId}"]`);
            if (checkbox) {
                checkbox.checked = data.processed === true;
                checkbox.disabled = data.processed === true;
            }
            pendingUpdates.delete(recordId);
            showMessage('处理状态已更新', 'success');
        }

        document.getElementById('searchBtn').addEventListener('click', () => {
            performSearch();
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        function performSearch() {
            currentFilters.search = document.getElementById('searchInput').value.trim();
            applyFilters();
        }

        document.getElementById('userFilter').addEventListener('change', (e) => {
            currentFilters.user = e.target.value;
            applyFilters();
        });

        document.getElementById('reporterFilter').addEventListener('change', (e) => {
            currentFilters.reporter = e.target.value;
            applyFilters();
        });

        document.getElementById('workFilter').addEventListener('change', (e) => {
            currentFilters.work = e.target.value;
            applyFilters();
        });

        document.getElementById('processedFilter').addEventListener('change', (e) => {
            currentFilters.processed = e.target.value;
            applyFilters();
        });

        document.getElementById('clearFiltersBtn').addEventListener('click', () => {
            currentFilters = {
                search: '',
                user: '',
                reporter: '',
                work: '',
                processed: ''
            };

            document.getElementById('searchInput').value = '';
            document.getElementById('userFilter').value = '';
            document.getElementById('reporterFilter').value = '';
            document.getElementById('workFilter').value = '';
            document.getElementById('processedFilter').value = '';

            applyFilters();

            showMessage('已清除所有筛选条件', 'success');
        });

        function showMessage(text, type = '') {
            const message = document.getElementById('statusMessage');
            message.textContent = text;
            message.className = `status-message ${type}`;
            message.style.display = 'block';

            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
