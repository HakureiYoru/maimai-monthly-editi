<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手元视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: rgba(0, 0, 0, 0);
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .container {
            max-width: 680px;
            width: 92%;
            max-height: 85vh;
            background: rgba(30, 30, 30, 0.97);
            border: 1px solid #555;
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid #444;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            font-size: 22px;
        }

        .header h2 {
            font-size: 17px;
            color: #fff;
            font-weight: 600;
        }

        .header .work-info {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #aaa;
            font-size: 18px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .video-count {
            font-size: 13px;
            color: #8ab4f8;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        .video-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .video-item {
            display: flex;
            gap: 14px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .video-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .video-item:last-child {
            margin-bottom: 0;
        }

        .video-cover {
            width: 160px;
            height: 100px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: #2a2a2a;
            position: relative;
        }

        .video-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-cover .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 28px;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
        }

        .video-cover .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .video-item:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay::after {
            content: '';
            border-style: solid;
            border-width: 7px 0 7px 12px;
            border-color: transparent transparent transparent #fff;
            margin-left: 2px;
        }

        .video-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .video-title {
            font-size: 14px;
            color: #e0e0e0;
            font-weight: 500;
            margin-bottom: 6px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-url {
            font-size: 11px;
            color: #8ab4f8;
            word-break: break-all;
            line-height: 1.3;
            opacity: 0.8;
        }

        .video-source {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #888;
            margin-top: 6px;
        }

        .video-source .bilibili-icon {
            color: #fb7299;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
            line-height: 1.6;
        }

        .empty-state .hint {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .loading-state {
            text-align: center;
            padding: 40px 20px;
            color: #8ab4f8;
            font-size: 14px;
        }

        .loading-state .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(138, 180, 248, 0.3);
            border-top-color: #8ab4f8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div>
                    <h2>手元视频</h2>
                    <div class="work-info" id="workInfo">加载中...</div>
                </div>
            </div>
            <button class="close-btn" id="closeBtn" title="关闭">✕</button>
        </div>

        <div class="video-count" id="videoCount"></div>

        <div class="video-list" id="videoList">
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <div>加载中...</div>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;

        window.addEventListener('message', (event) => {
            const msg = event.data;

            if (msg.action === 'init') {
                currentData = msg;
                renderPanel();
            }
        });

        function renderPanel() {
            if (!currentData) return;

            const { sequenceId, title, videos } = currentData;

            document.getElementById('workInfo').textContent =
                `#${sequenceId} ${title || ''}`;

            const videoList = document.getElementById('videoList');
            const videoCount = document.getElementById('videoCount');

            if (!videos || videos.length === 0) {
                videoCount.textContent = '';
                videoList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📹</div>
                        <p>暂无手元视频</p>
                        <div class="hint">
                            在 QQ 群发送「MMFC添加手元 ${sequenceId} 链接」即可添加
                        </div>
                    </div>
                `;
                return;
            }

            videoCount.textContent = `共 ${videos.length} 个手元视频`;

            let html = '';
            videos.forEach((video, index) => {
                const isObject = typeof video === 'object' && video !== null;
                const url = isObject ? video.url : video;
                const cover = isObject ? (video.cover || '') : '';
                const videoTitle = isObject ? (video.videoTitle || '') : '';

                const displayTitle = videoTitle || extractTitleFromUrl(url);
                const displayUrl = shortenUrl(url);
                const isBilibili = url.includes('bilibili.com') || url.includes('b23.tv');

                html += `
                    <div class="video-item" onclick="openVideo('${escapeAttr(url)}')">
                        <div class="video-cover">
                            ${cover
                                ? `<img src="${escapeAttr(cover)}" alt="封面" onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>▶</div>'">`
                                : '<div class="placeholder">▶</div>'
                            }
                            <div class="play-overlay"></div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">${escapeHtml(displayTitle)}</div>
                            <div class="video-url">${escapeHtml(displayUrl)}</div>
                            ${isBilibili ? '<div class="video-source"><span class="bilibili-icon">●</span> bilibili</div>' : ''}
                        </div>
                    </div>
                `;
            });

            videoList.innerHTML = html;
        }

        function openVideo(url) {
            window.open(url, '_blank');
        }

        function extractTitleFromUrl(url) {
            if (url.includes('bilibili.com/video/')) {
                const match = url.match(/video\/(BV[\w]+)/i);
                if (match) return `B站视频 ${match[1]}`;
            }
            if (url.includes('b23.tv/')) {
                const match = url.match(/b23\.tv\/([\w]+)/);
                if (match) return `B站视频 (短链接)`;
            }
            return `视频 ${url.split('/').pop() || ''}`;
        }

        function shortenUrl(url) {
            if (url.length <= 60) return url;
            return url.substring(0, 50) + '...' + url.substring(url.length - 8);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        document.getElementById('closeBtn').addEventListener('click', () => {
            window.parent.postMessage({ action: 'closeShouyuanPanel' }, '*');
        });
    </script>
</body>
</html>
