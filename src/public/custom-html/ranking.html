<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排行榜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      padding: 20px;
      min-height: 100vh;
      background: transparent;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* 毛玻璃卡片 */
    .glass-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 28px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title .count-badge {
      font-size: 13px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 20px;
      padding: 2px 12px;
      color: rgba(255, 255, 255, 0.9);
    }

    /* 排名列表 */
    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 4px;
      transition: background 0.2s ease, transform 0.2s ease;
      position: relative;
    }

    .ranking-item + .ranking-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50px;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.05) 80%, transparent);
    }

    .ranking-item:hover {
      transform: translateX(4px);
    }

    /* 前三名特殊样式（仅文字色调，无外框） */
    .ranking-item.rank-1 { }
    .ranking-item.rank-2 { }
    .ranking-item.rank-3 { }

    /* 名次数字 */
    .rank-number {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.85);
    }

    .rank-1 .rank-number {
      background: rgba(255, 215, 0, 0.2);
      color: #ffe566;
      font-size: 16px;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.7), 0 0 20px rgba(255, 215, 0, 0.4), inset 0 0 8px rgba(255, 215, 0, 0.2);
      border: 1px solid rgba(255, 215, 0, 0.6);
      animation: glow-gold 2s ease-in-out infinite;
    }

    .rank-2 .rank-number {
      background: rgba(192, 192, 192, 0.2);
      color: #e0e0e0;
      font-size: 16px;
      box-shadow: 0 0 10px rgba(200, 200, 200, 0.6), 0 0 20px rgba(200, 200, 200, 0.3), inset 0 0 8px rgba(200, 200, 200, 0.15);
      border: 1px solid rgba(200, 200, 200, 0.5);
      animation: glow-silver 2s ease-in-out infinite;
    }

    .rank-3 .rank-number {
      background: rgba(205, 127, 50, 0.2);
      color: #e8a96a;
      font-size: 16px;
      box-shadow: 0 0 10px rgba(205, 127, 50, 0.6), 0 0 20px rgba(205, 127, 50, 0.3), inset 0 0 8px rgba(205, 127, 50, 0.15);
      border: 1px solid rgba(205, 127, 50, 0.5);
      animation: glow-bronze 2s ease-in-out infinite;
    }

    @keyframes glow-gold {
      0%, 100% { box-shadow: 0 0 8px rgba(255, 215, 0, 0.6), 0 0 18px rgba(255, 215, 0, 0.3); }
      50%       { box-shadow: 0 0 14px rgba(255, 215, 0, 0.9), 0 0 28px rgba(255, 215, 0, 0.5); }
    }

    @keyframes glow-silver {
      0%, 100% { box-shadow: 0 0 8px rgba(200, 200, 200, 0.5), 0 0 18px rgba(200, 200, 200, 0.25); }
      50%       { box-shadow: 0 0 14px rgba(200, 200, 200, 0.8), 0 0 28px rgba(200, 200, 200, 0.4); }
    }

    @keyframes glow-bronze {
      0%, 100% { box-shadow: 0 0 8px rgba(205, 127, 50, 0.5), 0 0 18px rgba(205, 127, 50, 0.25); }
      50%       { box-shadow: 0 0 14px rgba(205, 127, 50, 0.8), 0 0 28px rgba(205, 127, 50, 0.4); }
    }

    /* 头像 */
    .avatar-wrap {
      flex-shrink: 0;
      display: flex;
    }

    .avatar-wrap a {
      display: flex;
      border-radius: 50%;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .avatar-wrap a:hover {
      opacity: 0.8;
      transform: scale(1.08);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.15);
    }

    /* 用户信息 */
    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 2px;
    }

    /* 总分 */
    .total-pp {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      text-align: right;
    }

    .total-pp .pp-label {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      display: block;
      text-align: right;
    }

    /* 加载态 */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 40px 0;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px 0;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glass-card">
      <div class="section-title">
        排行榜
        <span class="count-badge" id="countBadge" style="display:none"></span>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <span>加载中...</span>
      </div>

      <div id="rankingList" class="ranking-list" style="display:none"></div>

      <div id="emptyState" class="empty-state" style="display:none">暂无排名数据</div>
    </div>
  </div>

  <script>
    const DEFAULT_PHOTO = "https://static.wixstatic.com/media/daf9ba_fb0143f9208d4e059c81d6f4e7855256~mv2.jpg";

    const loadingEl = document.getElementById('loadingState');
    const listEl = document.getElementById('rankingList');
    const emptyEl = document.getElementById('emptyState');
    const countEl = document.getElementById('countBadge');

    function getRankClass(rank) {
      if (rank === 1) return 'rank-1';
      if (rank === 2) return 'rank-2';
      if (rank === 3) return 'rank-3';
      return '';
    }

    function getRankIcon(rank) {
      return rank;
    }

    function renderRanking(members) {
      loadingEl.style.display = 'none';

      if (!members || members.length === 0) {
        emptyEl.style.display = 'block';
        return;
      }

      countEl.textContent = `共 ${members.length} 人`;
      countEl.style.display = 'inline-block';

      listEl.innerHTML = members.map(member => `
        <div class="ranking-item ${getRankClass(member.rank)}">
          <div class="rank-number">${getRankIcon(member.rank)}</div>
          <div class="avatar-wrap">
            ${member.website
              ? `<a href="${member.website}" target="_blank" rel="noopener noreferrer">
                  <img class="avatar" src="${member.photo || DEFAULT_PHOTO}" onerror="this.src='${DEFAULT_PHOTO}'" alt="${member.title || '用户'}" />
                </a>`
              : `<img class="avatar" src="${member.photo || DEFAULT_PHOTO}" onerror="this.src='${DEFAULT_PHOTO}'" alt="${member.title || '用户'}" />`
            }
          </div>
          <div class="user-info">
            <div class="user-name">${member.title || '未知用户'}</div>
            <div class="user-sub">排名 #${member.rank}</div>
          </div>
          <div class="total-pp">
            ${member.totalPp ?? 0}
            <span class="pp-label">总分</span>
          </div>
        </div>
      `).join('');

      listEl.style.display = 'flex';
    }

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || !data.type) return;

      if (data.type === 'RANKING_DATA') {
        renderRanking(data.members);
      }

      if (data.type === 'RANKING_LOADING') {
        loadingEl.style.display = 'flex';
        listEl.style.display = 'none';
        emptyEl.style.display = 'none';
        countEl.style.display = 'none';
      }
    });
  </script>
</body>
</html>
