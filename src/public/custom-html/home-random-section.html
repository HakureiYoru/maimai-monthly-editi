<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #fff;
    font-family: Arial, sans-serif;
    color: #000;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    grid-template-rows: repeat(2, minmax(0, 1fr));
    width: 100%;
    height: 100%;
  }

  .col {
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 10px;
    overflow: hidden;
    min-width: 0;
    container-type: size;
  }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
  }

  .col-title {
    font-size: 15px;
    font-weight: bold;
  }

  .refresh-btn {
    background: #000;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .refresh-btn:hover { background: #333; }
  .refresh-btn:active { background: #555; }

  .loading {
    font-size: 13px;
    color: #888;
  }

  .hidden { display: none !important; }

  .member-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 0;
  }

  .avatar-wrap {
    width: min(200px, 42cqw, 42cqh);
    aspect-ratio: 1;
    border-radius: 50%;
    border: 2px solid #000;
    overflow: hidden;
    flex-shrink: 0;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2em;
    font-weight: bold;
    color: #555;
  }

  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .member-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
  }

  .member-name {
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    word-break: break-all;
  }

  .member-rank {
    font-size: 12px;
    color: #555;
    text-align: center;
  }

  .link-btn,
  .sign-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #fff;
    border: none;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    border-radius: 4px;
    flex-shrink: 0;
    min-height: 36px;
  }
  .link-btn:hover,
  .sign-btn:hover { background: #333; }
  .sign-btn:disabled {
    background: #d0d0d0;
    color: #777;
    cursor: not-allowed;
  }

  /* 音击格：占满格子剩余高度，图片完整显示且不撑破 htmlHomeSection */
  #colOngaki {
    min-height: 0;
  }

  .ongaki-img-wrap {
    flex: 1;
    min-height: 60px;
    min-width: 0;
    width: 100%;
    border: 1px solid #ccc;
    background: #f5f5f5;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .ongaki-img-wrap .loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .ongaki-img-wrap img {
    display: none;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
  }

  .sign-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .sign-reward {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    align-self: flex-start;
    padding: 4px 10px;
    border-radius: 999px;
    background: #f3f3f3;
    font-size: 12px;
    font-weight: bold;
  }

  .sign-note {
    font-size: 12px;
    color: #666;
    line-height: 1.5;
  }

  .sign-status {
    font-size: 12px;
    color: #111;
    min-height: 18px;
  }

  .sign-stats {
    display: grid;
    gap: 8px;
    margin-top: auto;
  }

  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid #ececec;
    border-radius: 8px;
    background: #fafafa;
  }

  .stat-label {
    font-size: 12px;
    color: #666;
  }

  .stat-value {
    font-size: 13px;
    font-weight: bold;
    color: #111;
    text-align: right;
    word-break: break-word;
  }

  .apply-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 0;
  }

  .apply-count {
    font-size: clamp(40px, 8vw, 72px);
    font-weight: bold;
    line-height: 1;
    letter-spacing: -2px;
  }

  .apply-label {
    font-size: 13px;
    color: #666;
  }

  @media (max-width: 900px) {
    html, body {
      height: auto;
      overflow: auto;
    }

    .grid {
      grid-template-columns: 1fr;
      grid-template-rows: none;
      height: auto;
    }

    .col {
      min-height: 220px;
    }
  }
</style>
</head>
<body>
<div class="grid">
  <div class="col" id="colSignIn">
    <div class="col-header">
      <span class="col-title">每日签到</span>
    </div>
    <div class="sign-body">
      <span class="sign-reward" id="signReward">+5 积分</span>
      <div class="sign-note">每天只能签到一次。签到后会立即更新当前积分与积分排名。</div>
      <button class="sign-btn" id="signInBtn" disabled>加载中...</button>
      <div class="sign-status" id="signStatus">正在加载签到状态...</div>
      <div class="sign-stats">
        <div class="stat-row">
          <span class="stat-label">当前积分</span>
          <span class="stat-value" id="currentPoints">--</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">积分排名</span>
          <span class="stat-value" id="currentRank">--</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">上次签到</span>
          <span class="stat-value" id="lastSignInTime">暂无</span>
        </div>
      </div>
    </div>
  </div>

  <div class="col" id="colMember">
    <div class="col-header">
      <span class="col-title">随机认识一个网友</span>
      <button class="refresh-btn" id="refreshMemberBtn" title="换一位">↺</button>
    </div>
    <div class="member-body">
      <span class="loading" id="memberLoading">Loading...</span>
      <div class="hidden" id="memberCard" style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%">
        <div class="avatar-wrap" id="avatarWrap"></div>
        <div class="member-info">
          <span class="member-name" id="memberName"></span>
          <span class="member-rank" id="memberRank"></span>
        </div>
      </div>
    </div>
    <a class="link-btn hidden" id="linkBtn" target="_blank" style="align-self:center">看看主页</a>
  </div>

  <div class="col" id="colOngaki">
    <div class="col-header">
      <span class="col-title">随机音击</span>
      <button class="refresh-btn" id="refreshOngakiBtn" title="换一张">↺</button>
    </div>
    <div class="ongaki-img-wrap" id="ongakiWrap">
      <span class="loading" id="ongakiLoading">Loading...</span>
      <img id="ongakiImg" alt="ongeki">
    </div>
  </div>

  <div class="col" id="colApply">
    <div class="col-header">
      <span class="col-title">本期参赛</span>
    </div>
    <div class="apply-body">
      <span class="apply-count" id="applyCount">--</span>
      <span class="apply-label">人已报名参赛</span>
    </div>
  </div>
</div>

<script>
  var refreshMemberBtn = document.getElementById('refreshMemberBtn');
  var memberLoading = document.getElementById('memberLoading');
  var memberRow = document.getElementById('memberCard');
  var avatarWrap = document.getElementById('avatarWrap');
  var memberName = document.getElementById('memberName');
  var memberRank = document.getElementById('memberRank');
  var linkBtn = document.getElementById('linkBtn');

  var refreshOngakiBtn = document.getElementById('refreshOngakiBtn');
  var ongakiLoading = document.getElementById('ongakiLoading');
  var ongakiImg = document.getElementById('ongakiImg');

  var applyCount = document.getElementById('applyCount');

  var signReward = document.getElementById('signReward');
  var signInBtn = document.getElementById('signInBtn');
  var signStatus = document.getElementById('signStatus');
  var currentPoints = document.getElementById('currentPoints');
  var currentRank = document.getElementById('currentRank');
  var lastSignInTime = document.getElementById('lastSignInTime');

  var dailyState = {
    loggedIn: false,
    canSignIn: false,
    rewardPoints: 5,
    points: null,
    rank: null,
    lastSignInAtDisplay: null
  };

  function setSignInButtonLoading(loading) {
    if (loading) {
      signInBtn.disabled = true;
      signInBtn.textContent = '签到中...';
      return;
    }

    if (!dailyState.loggedIn) {
      signInBtn.disabled = true;
      signInBtn.textContent = '登录后签到';
      return;
    }

    signInBtn.disabled = !dailyState.canSignIn;
    signInBtn.textContent = dailyState.canSignIn ? '签到领积分' : '今日已签到';
  }

  function renderMember(data) {
    if (!data) {
      memberLoading.textContent = '暂无数据';
      return;
    }

    memberName.textContent = data.name || '（无昵称）';
    memberRank.textContent = data.rank ? 'Rank: ' + data.rank : '';

    avatarWrap.innerHTML = '';
    if (data.photo) {
      var img = document.createElement('img');
      img.src = data.photo;
      img.onerror = function() {
        avatarWrap.innerHTML = (data.name || '?').charAt(0).toUpperCase();
      };
      avatarWrap.appendChild(img);
    } else {
      avatarWrap.textContent = (data.name || '?').charAt(0).toUpperCase();
    }

    if (data.link) {
      linkBtn.href = data.link;
      linkBtn.classList.remove('hidden');
    } else {
      linkBtn.classList.add('hidden');
    }

    memberLoading.classList.add('hidden');
    memberRow.classList.remove('hidden');
  }

  function renderOngaki(url) {
    ongakiImg.onload = function() {
      ongakiLoading.style.display = 'none';
      ongakiImg.style.display = 'block';
    };
    ongakiImg.onerror = function() {
      ongakiLoading.textContent = '图片加载失败';
    };
    ongakiImg.src = url;
  }

  function renderDailySignIn(data) {
    dailyState = Object.assign({}, dailyState, data || {});

    signReward.textContent = '+' + (dailyState.rewardPoints || 5) + ' 积分';
    currentPoints.textContent = dailyState.points == null ? '--' : String(dailyState.points);
    currentRank.textContent = dailyState.rank == null ? '--' : '#' + dailyState.rank;
    lastSignInTime.textContent = dailyState.lastSignInAtDisplay || '暂无';

    if (!dailyState.loggedIn) {
      signStatus.textContent = '请先登录后再签到。';
    } else if (dailyState.canSignIn) {
      signStatus.textContent = '今天还没有签到。';
    } else {
      signStatus.textContent = '今日已签到。';
    }

    setSignInButtonLoading(false);
  }

  function handleDailySignInResult(data) {
    if (!data) {
      setSignInButtonLoading(false);
      return;
    }

    if (data.loggedIn) {
      renderDailySignIn(data);
    } else {
      dailyState.loggedIn = false;
      dailyState.canSignIn = false;
      setSignInButtonLoading(false);
    }

    signStatus.textContent = data.message || signStatus.textContent;
  }

  refreshMemberBtn.addEventListener('click', function() {
    memberLoading.textContent = 'Loading...';
    memberLoading.classList.remove('hidden');
    memberRow.classList.add('hidden');
    linkBtn.classList.add('hidden');
    window.parent.postMessage({ type: 'refreshMember' }, '*');
  });

  refreshOngakiBtn.addEventListener('click', function() {
    ongakiLoading.style.display = '';
    ongakiImg.style.display = 'none';
    window.parent.postMessage({ type: 'refreshOngaki' }, '*');
  });

  signInBtn.addEventListener('click', function() {
    if (signInBtn.disabled) return;
    setSignInButtonLoading(true);
    signStatus.textContent = '签到中...';
    window.parent.postMessage({ type: 'claimDailySignIn' }, '*');
  });

  window.addEventListener('message', function(e) {
    if (!e.data) return;

    if (e.data.type === 'memberData') renderMember(e.data.data);
    if (e.data.type === 'ongakiImage' && e.data.url) renderOngaki(e.data.url);
    if (e.data.type === 'dailySignInData') renderDailySignIn(e.data.data);
    if (e.data.type === 'dailySignInResult') handleDailySignInResult(e.data.data);
    if (e.data.type === 'applicationStats') applyCount.textContent = String(e.data.count ?? '--');
  });

  renderDailySignIn(dailyState);
  window.parent.postMessage({ type: 'readyHomeSection' }, '*');
</script>
</body>
</html>
