<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden; background: transparent;
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }

    /* ── Swiper 容器：边缘淡出 ── */
    .swiper {
      width: 100%; height: 100vh;
      -webkit-mask-image:
        linear-gradient(to right,  transparent 0%,  black 12%, black 88%, transparent 100%),
        linear-gradient(to bottom, transparent 0%,  black 10%, black 88%, transparent 100%);
      mask-image:
        linear-gradient(to right,  transparent 0%,  black 12%, black 88%, transparent 100%),
        linear-gradient(to bottom, transparent 0%,  black 10%, black 88%, transparent 100%);
      -webkit-mask-composite: source-in; mask-composite: intersect;
    }
    .swiper-slide { position: relative; overflow: visible; background: transparent; }

    /* ── 1. 星云背景层：取代单调的光晕，使用双色流体交融 ── */
    .s-nebula {
      position: absolute;
      left: 50%; top: 40%;
      width: 700px; height: 500px;
      transform: translate(-50%, -50%);
      z-index: 1; pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease-out;
    }
    .swiper-slide-active .s-nebula { opacity: 1; }

    /* 两个互相交叠、互相缠绕的发光体 */
    .nebula-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(45px); /* 极度虚化产生气体感 */
      mix-blend-mode: screen; /* 与底色进行光学滤色混合 */
    }
    .nebula-gold {
      width: 500px; height: 350px;
      background: rgba(230, 180, 80, 0.15); /* 金色星云 */
      top: 10%; left: -5%;
      animation: driftA 12s infinite alternate ease-in-out;
    }
    .nebula-blue {
      width: 550px; height: 400px;
      background: rgba(80, 140, 255, 0.12); /* 蓝色星云 */
      bottom: -10%; right: -5%;
      animation: driftB 15s infinite alternate ease-in-out;
    }

    @keyframes driftA {
      0% { transform: translate(0, 0) scale(0.9) rotate(0deg); }
      100% { transform: translate(40px, -20px) scale(1.1) rotate(15deg); }
    }
    @keyframes driftB {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { transform: translate(-30px, 30px) scale(0.95) rotate(-10deg); }
    }

    /* ── 2. 封面流体容器：不再是圆，而是呼吸的“水滴/阿米巴” ── */
    .s-orb {
      position: absolute;
      left: 50%; top: 40%;
      width: 480px; height: 380px; /* 改为非正方形，更具流动张力 */
      z-index: 2;
      
      /* 椭圆形的径向渐变 Mask，中心实，边缘散 */
      -webkit-mask-image: radial-gradient(ellipse at center, black 35%, rgba(0,0,0,0.1) 75%, transparent 100%);
      mask-image: radial-gradient(ellipse at center, black 35%, rgba(0,0,0,0.1) 75%, transparent 100%);

      transform: translate(-50%, -35%) scale(0.85);
      filter: blur(15px) brightness(0.6);
      opacity: 0;
      transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1), filter 1.2s ease, opacity 1.2s ease;
      
      /* 核心：初始的流体形状 */
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
    }
    
    .swiper-slide-active .s-orb {
      transform: translate(-50%, -50%) scale(1);
      filter: blur(0px) brightness(1);
      opacity: 1;
      /* 同时执行悬浮(transform)和流变(border-radius)动画 */
      animation: 
        orbFloat 6s ease-in-out 1.2s infinite alternate forwards,
        blobMorph 12s linear infinite; 
    }

    /* 悬浮控制位置 */
    @keyframes orbFloat {
      0% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, -53%) scale(1.02); }
    }

    /* 流变控制边缘形状，产生有机生命感 */
    @keyframes blobMorph {
      0%   { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
      33%  { border-radius: 40% 60% 70% 30% / 50% 60% 30% 60%; }
      66%  { border-radius: 70% 30% 50% 50% / 30% 40% 60% 70%; }
      100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    }

    .s-orb img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 10s ease-out; /* 极其缓慢的视差呼吸 */
    }
    .swiper-slide-active .s-orb img { transform: scale(1.15); }
    
    .s-orb-fallback {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(30,32,66,0.5), rgba(45,19,78,0.5));
      color: rgba(255,255,255,0.6); font-size: 24px; font-weight: 700; letter-spacing: 3px;
    }

    /* ── 3. 透明气泡云：从封面向外延展，替代一次性滚动弹幕 ── */
    .dm-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;
      filter: drop-shadow(0 16px 30px rgba(16, 24, 48, 0.18));
    }
    .dm-node {
      position: absolute;
      left: 50%;
      top: 40%;
      width: 0;
      height: 0;
      --bubble-bg-a: rgba(255, 255, 255, 0.22);
      --bubble-bg-b: rgba(146, 190, 255, 0.08);
      --bubble-ring: rgba(255, 255, 255, 0.18);
      --bubble-glow: rgba(126, 182, 255, 0.18);
      --bubble-line: rgba(255, 255, 255, 0.5);
    }
    .dm-tone-warm {
      --bubble-bg-a: rgba(255, 236, 209, 0.22);
      --bubble-bg-b: rgba(255, 187, 117, 0.08);
      --bubble-ring: rgba(255, 228, 183, 0.2);
      --bubble-glow: rgba(255, 185, 122, 0.18);
      --bubble-line: rgba(255, 223, 176, 0.52);
    }
    .dm-tone-cool {
      --bubble-bg-a: rgba(223, 239, 255, 0.22);
      --bubble-bg-b: rgba(117, 171, 255, 0.08);
      --bubble-ring: rgba(211, 232, 255, 0.22);
      --bubble-glow: rgba(119, 184, 255, 0.18);
      --bubble-line: rgba(196, 224, 255, 0.52);
    }
    .dm-tone-neutral {
      --bubble-bg-a: rgba(255, 255, 255, 0.2);
      --bubble-bg-b: rgba(208, 190, 255, 0.08);
      --bubble-ring: rgba(255, 255, 255, 0.18);
      --bubble-glow: rgba(190, 164, 255, 0.16);
      --bubble-line: rgba(245, 239, 255, 0.48);
    }
    .dm-link {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--line-w);
      height: 1px;
      opacity: 0;
      transform-origin: left center;
      transform: rotate(var(--angle)) scaleX(0.12);
      background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, var(--bubble-line) 18%, rgba(255,255,255,0.12) 72%, rgba(255,255,255,0) 100%);
      box-shadow: 0 0 12px rgba(255,255,255,0.12);
      transition:
        transform 1.15s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.9s ease;
      transition-delay: var(--delay);
    }
    .dm-shell {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      filter: blur(12px);
      transform: translate(calc(var(--dx) * 0.18), calc(var(--dy) * 0.18)) scale(0.52);
      transition:
        transform 1.3s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.9s ease,
        filter 1s ease;
      transition-delay: var(--delay);
    }
    .dm-bubble {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: max-content;
      max-width: min(var(--size), 42vw);
      min-height: 52px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid var(--bubble-ring);
      color: rgba(255,255,255,0.94);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04) 45%),
        linear-gradient(135deg, var(--bubble-bg-a), var(--bubble-bg-b));
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      box-shadow:
        0 20px 40px rgba(9, 16, 36, 0.24),
        0 0 28px var(--bubble-glow),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -12px 18px rgba(255,255,255,0.04);
      transform: translate3d(0, 0, 0);
      animation:
        bubbleFloat 7.5s ease-in-out infinite alternate,
        bubblePulse 5.5s ease-in-out infinite;
      animation-delay: var(--delay), calc(var(--delay) * -1.4);
      animation-play-state: paused;
    }
    .dm-bubble::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: linear-gradient(150deg, rgba(255,255,255,0.24), rgba(255,255,255,0) 48%, rgba(255,255,255,0.08) 100%);
      pointer-events: none;
    }
    .dm-bubble::after {
      content: "";
      position: absolute;
      left: 14%;
      top: 14%;
      width: 34%;
      height: 28%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.36), rgba(255,255,255,0));
      filter: blur(8px);
      opacity: 0.85;
      pointer-events: none;
    }
    .dm-label {
      position: relative;
      z-index: 1;
      font-size: 13px;
      line-height: 1.55;
      font-weight: 500;
      letter-spacing: 0.4px;
      text-shadow: 0 1px 10px rgba(5, 11, 28, 0.35);
      word-break: break-word;
      text-align: center;
    }
    .swiper-slide-active .dm-link {
      opacity: 0.9;
      transform: rotate(var(--angle)) scaleX(1);
    }
    .swiper-slide-active .dm-shell {
      opacity: 1;
      filter: blur(0px);
      transform: translate(var(--dx), var(--dy)) scale(1);
    }
    .swiper-slide-active .dm-bubble { animation-play-state: running; }
    @keyframes bubbleFloat {
      0%   { transform: translate3d(0, 0, 0) scale(1); }
      50%  { transform: translate3d(calc(var(--drift-x) * 0.55), calc(var(--drift-y) * 0.55), 0) scale(1.02); }
      100% { transform: translate3d(var(--drift-x), var(--drift-y), 0) scale(0.985); }
    }
    @keyframes bubblePulse {
      0%, 100% { box-shadow: 0 20px 40px rgba(9, 16, 36, 0.22), 0 0 20px var(--bubble-glow), inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -12px 18px rgba(255,255,255,0.04); }
      50% { box-shadow: 0 24px 48px rgba(9, 16, 36, 0.3), 0 0 32px var(--bubble-glow), inset 0 1px 0 rgba(255,255,255,0.28), inset 0 -12px 18px rgba(255,255,255,0.06); }
    }

    .s-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 20px 30px; z-index: 4; text-align: center; transform: translateY(20px); filter: blur(8px); opacity: 0; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s; }
    .swiper-slide-active .s-info { transform: translateY(0); filter: blur(0); opacity: 1; }
    .s-seq { font-size: 13px; font-weight: 500; letter-spacing: 4px; color: rgba(255, 255, 255, 0.55); margin-bottom: 8px; text-transform: uppercase; }
    .s-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: #fff; text-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 1px 3px rgba(0,0,0,0.3); line-height: 1.4; display: -webkit-box; line-clamp: 2; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .swiper-button-prev, .swiper-button-next { color: rgba(255,255,255,0.6) !important; background: transparent; width: 44px !important; height: 44px !important; border-radius: 50%; transition: all 0.4s ease; }
    .swiper-button-prev:hover, .swiper-button-next:hover { color: #fff !important; background: rgba(255,255,255,0.08); backdrop-filter: blur(4px); }
    .swiper-button-prev::after, .swiper-button-next::after { font-size: 16px !important; font-weight: 300; }
    .swiper-pagination-bullet { background: rgba(255,255,255,0.3) !important; width: 6px !important; height: 6px !important; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
    .swiper-pagination-bullet-active { background: rgba(255,255,255,0.95) !important; width: 24px !important; border-radius: 3px !important; box-shadow: 0 0 8px rgba(255,255,255,0.4); }

    .state-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; background: transparent; color: rgba(255,255,255,0.5); font-size: 14px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); letter-spacing: 1px; }
    .state-screen strong { color: rgba(255,255,255,0.9); font-size: 18px; font-weight: 400; letter-spacing: 3px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="state-screen"><strong>MMFC</strong><span>Loading</span></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const API = "https://mmfc.majdata.net/_functions";
    const esc = s => String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    const setApp = html => (document.getElementById("app").innerHTML = html);

    async function fetchCover(seqId) {
      try {
        const r = await fetch(`${API}/contestEntry/${seqId}/3`);
        const d = await r.json();
        return d.downloadUrl || (d.data && d.data.downloadUrl) || "";
      } catch (_) { return ""; }
    }

    function toCommentFragments(comment) {
      const raw = String(comment || "").replace(/\s+/g, " ").trim();
      if (!raw) return [];

      const byPunctuation = raw
        .split(/[，,。！？!?；;、|/]+/)
        .map(part => part.trim())
        .filter(Boolean);

      const pieces = (byPunctuation.length > 1 ? byPunctuation : (raw.match(/.{1,12}/g) || [raw]))
        .map(part => part.length > 20 ? `${part.slice(0, 20)}…` : part);

      return pieces.slice(0, 5);
    }

    function bubbleNodeHTML(spec, text) {
      const length = Math.max(56, Math.hypot(spec.dx, spec.dy) - spec.size * 0.28);
      const angle = `${(Math.atan2(spec.dy, spec.dx) * 180) / Math.PI}deg`;
      const tone = spec.tone || "neutral";
      const nodeClass = `dm-node dm-tone-${tone}`;

      return `
        <div class="${nodeClass}" style="--dx:${spec.dx}px;--dy:${spec.dy}px;--size:${spec.size}px;--line-w:${length}px;--angle:${angle};--delay:${spec.delay}s;--drift-x:${spec.driftX}px;--drift-y:${spec.driftY}px;">
          <span class="dm-link"></span>
          <span class="dm-shell">
            <span class="dm-bubble"><span class="dm-label">${esc(text)}</span></span>
          </span>
        </div>`;
    }

    function buildCommentCloud(comment) {
      const textSpecs = [
        { dx: 220, dy: -138, size: 210, delay: 0.18, driftX: 14, driftY: -10, tone: "warm" },
        { dx: -228, dy: -76, size: 180, delay: 0.44, driftX: -12, driftY: 12, tone: "cool" },
        { dx: 250, dy: 64, size: 188, delay: 0.72, driftX: 10, driftY: 10, tone: "neutral" },
        { dx: -190, dy: 144, size: 186, delay: 0.96, driftX: -14, driftY: -8, tone: "warm" },
        { dx: 26, dy: 192, size: 200, delay: 1.2, driftX: 0, driftY: 14, tone: "cool" }
      ];
      const fragments = toCommentFragments(comment);
      return fragments.map((text, index) => bubbleNodeHTML(textSpecs[index], text)).join("");
    }

    function slideHTML(item, cover) {
      const orbInner = cover
        ? `<img src="${esc(cover)}" alt="" onerror="this.parentElement.innerHTML='<div class=s-orb-fallback>#${item.sequenceId}</div>'" />`
        : `<div class="s-orb-fallback">#${item.sequenceId}</div>`;
      const dm = buildCommentCloud(item.comment);

      /* 在这里加入了底层的双色星云容器 s-nebula */
      return `
        <div class="swiper-slide">
          <div class="s-nebula">
            <div class="nebula-glow nebula-gold"></div>
            <div class="nebula-glow nebula-blue"></div>
          </div>
          <div class="dm-layer">${dm}</div>
          <div class="s-orb">${orbInner}</div>
          <div class="s-info">
            <div class="s-seq">NO.${item.sequenceId}</div>
            <div class="s-title">${esc(item.workTitle || "")}</div>
          </div>
        </div>`;
    }

    async function init() {
      let items = [];
      try {
        const resp = await fetch(`${API}/recommendBoard`);
        const json = await resp.json();
        items = Array.isArray(json) ? json : (json.data || []);
      } catch (_) {
        setApp('<div class="state-screen"><strong>MMFC</strong><span>无法连接到星空，请稍后重试</span></div>');
        return;
      }

      if (!items.length) {
        setApp('<div class="state-screen"><strong>MMFC</strong><span>暂时没有内容</span></div>');
        return;
      }

      const covers = await Promise.all(items.map(item => fetchCover(item.sequenceId)));

      setApp(`
        <div class="swiper">
          <div class="swiper-wrapper">
            ${items.map((item, i) => slideHTML(item, covers[i])).join("")}
          </div>
          <div class="swiper-pagination"></div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
      `);

      const sw = new Swiper(".swiper", {
        effect:      "fade",
        fadeEffect:  { crossFade: true },
        speed:       1200, 
        autoplay: { delay: 7000, disableOnInteraction: false, pauseOnMouseEnter: true },
        loop:        items.length > 1,
        pagination:  { el: ".swiper-pagination", clickable: true },
        navigation:  { prevEl: ".swiper-button-prev", nextEl: ".swiper-button-next" },
      });
    }

    init();
  </script>
</body>
</html>
