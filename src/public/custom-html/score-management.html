<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分数管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background: rgba(0, 0, 0, 0);
            color: #fff;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* iOS 平滑滚动 */
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100%;
        }

        .header {
            background: rgba(42, 42, 42, 0.92);
            border: 1px solid #555;
            padding: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #777;
            background: #3a3a3a;
        }

        .search-box input::placeholder {
            color: #888;
        }

        .search-icon {
            display: none;
        }

        select,
        button {
            padding: 10px 15px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        select:hover,
        button:hover {
            background: #3a3a3a;
            border-color: #777;
        }

        button {
            background: #555;
            border-color: #666;
        }

        button:hover {
            background: #666;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(42, 42, 42, 0.92);
            border: 1px solid #555;
            padding: 15px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 8px;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }

        .works-grid {
            display: grid;
            gap: 15px;
        }

        .work-card {
            background: rgba(42, 42, 42, 0.92);
            border: 1px solid #555;
            border-left: 3px solid #666;
            padding: 20px;
            transition: all 0.3s;
        }

        .work-card:hover {
            background: #3a3a3a;
            border-left-color: #888;
        }

        .work-header {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #444;
        }

        .work-cover {
            width: 100px;
            height: 100px;
            background: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .work-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .work-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .work-title {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .work-id {
            background: #555;
            color: #fff;
            padding: 4px 12px;
            font-size: 14px;
        }

        .work-author {
            font-size: 13px;
            color: #bbb;
        }

        .work-author .registration-id {
            color: #999;
        }

        .owner-profile-link {
            display: block;
            color: #FFD700;
            text-decoration: none;
            font-size: 12px;
            margin-top: 3px;
            word-break: break-all;
            opacity: 0.8;
        }

        .owner-profile-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .tier-badge {
            display: inline-block;
            padding: 4px 12px;
            font-weight: bold;
            font-size: 14px;
        }

        .tier-T0 {
            background: #FFD700;
            color: #000;
        }

        .tier-T1 {
            background: #87CEEB;
            color: #000;
        }

        .tier-T2 {
            background: #90EE90;
            color: #000;
        }

        .tier-T3 {
            background: #FFE066;
            color: #000;
        }

        .tier-T4 {
            background: #D3D3D3;
            color: #000;
        }

        .tier-已淘汰 {
            background: #666;
            color: #fff;
            opacity: 0.6;
        }

        .tier-评分不足 {
            background: #FFA500;
            color: #fff;
        }

        /* 高权重标记 */
        .high-quality-badge {
            background: #FFD700;
            color: #000;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 5px;
            display: inline-block;
        }

        /* 权重信息区域 */
        .weight-info {
            margin-top: 15px;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
        }

        .weight-info-title {
            font-size: 13px;
            font-weight: bold;
            color: #ccc;
            margin-bottom: 8px;
        }

        .weight-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #ddd;
        }

        .weight-stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .weight-ratio-bar-container {
            margin-top: 10px;
        }

        .weight-ratio-label {
            font-size: 12px;
            color: #ccc;
            margin-bottom: 5px;
        }

        .weight-ratio-bar {
            height: 20px;
            overflow: hidden;
            background: #444;
            display: flex;
        }

        .high-weight-portion {
            background: #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 11px;
            font-weight: bold;
        }

        .low-weight-portion {
            background: #90EE90;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 11px;
            font-weight: bold;
        }

        .score-comparison {
            margin-top: 10px;
            padding: 8px;
            background: #333;
            font-size: 12px;
            border-left: 3px solid #FFD700;
            color: #ddd;
        }

        .score-comparison-item {
            margin: 3px 0;
        }

        .score-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .score-label {
            font-size: 12px;
            color: #ccc;
        }

        .score-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        .raters-section {
            margin-top: 15px;
        }

        .raters-header {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .raters-header:hover {
            color: #fff;
        }

        .toggle-icon {
            transition: transform 0.3s;
        }

        .toggle-icon.expanded {
            transform: rotate(90deg);
        }

        .raters-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .raters-list.expanded {
            max-height: 2000px;
        }

        .rater-item {
            background: #333;
            padding: 12px;
            border-left: 3px solid #666;
        }

        .rater-name {
            font-weight: bold;
            color: #fff;
            margin-bottom: 4px;
            font-size: 13px;
            word-break: break-all;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rater-name a {
            color: #FFD700;
            text-decoration: none;
        }

        .rater-name a:hover {
            color: #FFA500;
            text-decoration: underline;
        }

        .user-avatar {
            width: 20px;
            height: 20px;
            object-fit: cover;
        }

        .rater-score {
            color: #FFD700;
            font-weight: bold;
            font-size: 16px;
        }

        .rater-comment {
            margin-top: 6px;
            font-size: 12px;
            color: #ccc;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .loading,
        .error {
            text-align: center;
            padding: 60px 20px;
            background: rgba(42, 42, 42, 0.92);
            border: 1px solid #555;
        }

        .loading {
            color: #ccc;
            font-size: 18px;
        }

        .error {
            color: #e74c3c;
            font-size: 18px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #444;
            border-top: 4px solid #ccc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .work-header {
                flex-direction: column;
            }

            .work-cover {
                width: 100%;
                height: 200px;
            }

            .score-info {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .raters-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📊 分数管理系统</h1>
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索作品ID或标题...">
                    <span class="search-icon">🔍</span>
                </div>
                <select id="tierFilter">
                    <option value="all">全部等级</option>
                    <option value="T0">T0</option>
                    <option value="T1">T1</option>
                    <option value="T2">T2</option>
                    <option value="T3">T3</option>
                    <option value="T4">T4</option>
                    <option value="评分不足">评分不足</option>
                    <option value="已淘汰">已淘汰</option>
                </select>
                <select id="sortBy">
                    <option value="id">按ID排序</option>
                    <option value="score">按分数排序</option>
                    <option value="ratings">按评论数排序</option>
                </select>
                <button id="exportBtn">📥 导出数据</button>
            </div>
        </div>

        <div class="stats" id="stats">
            <!-- 统计卡片会动态生成 -->
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载数据...</p>
            </div>
        </div>
    </div>

    <script>
        let allWorks = [];
        let config = { minRatingsForRanking: 5 };

        // 监听来自Wix页面的消息
        window.addEventListener('message', (event) => {
            if (event.data.type === 'data') {
                allWorks = event.data.works;
                if (event.data.config && typeof event.data.config.minRatingsForRanking === 'number') {
                    config.minRatingsForRanking = event.data.config.minRatingsForRanking;
                }
                renderWorks(allWorks);
                updateStats(allWorks);
            } else if (event.data.type === 'loading') {
                showLoading(event.data.message);
            } else if (event.data.type === 'error') {
                showError(event.data.message);
            }
        });

        // 页面加载完成，通知Wix准备接收数据
        window.onload = () => {
            window.parent.postMessage({ action: 'ready' }, '*');
        };

        // 渲染作品列表
        function renderWorks(works) {
            const content = document.getElementById('content');

            if (works.length === 0) {
                content.innerHTML = '<div class="no-data">没有找到符合条件的作品</div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'works-grid';

            works.forEach(work => {
                const card = createWorkCard(work);
                grid.appendChild(card);
            });

            content.innerHTML = '';
            content.appendChild(grid);
        }

        // 创建作品卡片
        function createWorkCard(work) {
            const card = document.createElement('div');
            card.className = 'work-card';

            // 处理封面图片显示
            const coverHtml = work.coverImage && work.coverImage.trim() !== ''
                ? `<img src="${work.coverImage}" alt="封面" onerror="this.parentElement.innerHTML='${work.sequenceId}';">`
                : work.sequenceId;

            const ownerName = work.ownerName || '未知投稿人';
            const ownerRegistration = work.ownerRegistrationName
                ? `<span class="registration-id">（${work.ownerRegistrationName}）</span>`
                : '';
            const ownerProfileLink = work.ownerSlug
                ? `<a href="https://mmfc.majdata.net/profile/${work.ownerSlug}/profile" target="_blank" class="owner-profile-link">https://mmfc.majdata.net/profile/${work.ownerSlug}/profile</a>`
                : '';
            const ownerHtml = `${ownerName}${ownerRegistration}${ownerProfileLink}`;

            // 处理评论者信息，显示用户名和高权重标记
            const ratersHtml = work.raters.length > 0
                ? work.raters.map(r => {
                    // 检测是否为无效用户
                    const isInvalidUser = r.userId === 'invalid-user' || r.userName === '[无效用户ID]';
                    
                    const avatarHtml = isInvalidUser
                        ? '❓'
                        : (r.profileImageUrl
                            ? `<img src="${r.profileImageUrl}" class="user-avatar" alt="${r.userName}">`
                            : '👤');

                    const userLink = r.userSlug
                        ? `https://mmfc.majdata.net/profile/${r.userSlug}/profile`
                        : '#';

                    const userNameHtml = isInvalidUser
                        ? `<span style="color: #999; font-style: italic;">${r.userName}</span>`
                        : (r.userSlug
                            ? `<a href="${userLink}" target="_blank">${r.userName || '未知用户'}</a>`
                            : `<span>${r.userName || '未知用户'}</span>`);

                    const highQualityBadge = r.isHighQuality
                        ? '<span class="high-quality-badge">⭐高权重</span>'
                        : '';

                    return `
                    <div class="rater-item">
                        <div class="rater-name">
                            ${avatarHtml}
                            ${userNameHtml}
                            ${highQualityBadge}
                        </div>
                        <div class="rater-score">⭐ ${r.score} 分</div>
                        <div class="rater-comment">${r.comment || '无评论'}</div>
                    </div>
                    `;
                }).join('')
                : '<div class="no-data">暂无评分</div>';

            // 权重信息区域
            const highPercent = work.numRatings > 0
                ? (work.highWeightCount / work.numRatings * 100).toFixed(1)
                : 0;
            const lowPercent = work.numRatings > 0
                ? (work.lowWeightCount / work.numRatings * 100).toFixed(1)
                : 0;

            const targetRatio = work.lowWeightCount > 0
                ? (work.highWeightCount / work.lowWeightCount).toFixed(2)
                : (work.highWeightCount > 0 ? '∞' : '0');

            const ratioStatus = work.numRatings >= config.minRatingsForRanking
                ? (work.ratio >= 0.4 && work.ratio <= 0.6
                    ? '✓ 比例均衡'
                    : (work.ratio > 0.6 ? '⚠ 高权重过多' : '⚠ 高权重不足'))
                : '';

            const weightInfoHtml = work.numRatings > 0 ? `
                <div class="weight-info">
                    <div class="weight-info-title">评分权重分布</div>
                    <div class="weight-stats">
                        <div class="weight-stat-item">
                            <span style="color: #FFA500;">⭐ 高权重:</span>
                            <strong>${work.highWeightCount}人 (${highPercent}%)</strong>
                        </div>
                        <div class="weight-stat-item">
                            <span style="color: #32CD32;">● 低权重:</span>
                            <strong>${work.lowWeightCount}人 (${lowPercent}%)</strong>
                        </div>
                        <div class="weight-stat-item">
                            <span>比例:</span>
                            <strong>1:${targetRatio}</strong>
                            <span style="margin-left: 5px; color: ${ratioStatus.includes('✓') ? '#32CD32' : '#FF6B6B'};">${ratioStatus}</span>
                        </div>
                    </div>
                    <div class="weight-ratio-bar-container">
                        <div class="weight-ratio-label">权重分布可视化（目标 1:2）</div>
                        <div class="weight-ratio-bar">
                            ${work.highWeightCount > 0 ? `<div class="high-weight-portion" style="width: ${highPercent}%">${work.highWeightCount > 0 ? work.highWeightCount + '人' : ''}</div>` : ''}
                            ${work.lowWeightCount > 0 ? `<div class="low-weight-portion" style="width: ${lowPercent}%">${work.lowWeightCount > 0 ? work.lowWeightCount + '人' : ''}</div>` : ''}
                        </div>
                    </div>
                    ${work.weightedAverage !== work.originalAverage ? `
                    <div class="score-comparison">
                        <div class="score-comparison-item"><strong>加权平均分:</strong> ${work.weightedAverage.toFixed(2)} 分（排名依据）</div>
                        <div class="score-comparison-item"><strong>原始平均分:</strong> ${work.originalAverage.toFixed(2)} 分</div>
                        <div class="score-comparison-item" style="color: #666; font-size: 11px;">* 高权重评分计算时权重 ×2</div>
                    </div>
                    ` : ''}
                </div>
            ` : '';

            card.innerHTML = `
                <div class="work-header">
                    <div class="work-cover">
                        ${coverHtml}
                    </div>
                    <div class="work-info">
                        <div class="work-title">
                            <span class="work-id">#${work.sequenceId}</span>
                            <span>${work.title}</span>
                        </div>
                        <div class="work-author">投稿人：${ownerHtml}</div>
                        <div>
                            <span class="tier-badge tier-${work.tier}">${work.tier}</span>
                            ${work.rank ? `<span style="color: #999; margin-left: 10px;">排名: #${work.rank}</span>` : ''}
                        </div>
                        <div class="score-info">
                            <div class="score-item">
                                <span class="score-label">加权平均分</span>
                                <span class="score-value">${work.averageScore.toFixed(2)}</span>
                            </div>
                            <div class="score-item">
                                <span class="score-label">评论数</span>
                                <span class="score-value">${work.numRatings}</span>
                            </div>
                        </div>
                    </div>
                </div>
                ${weightInfoHtml}
                <div class="raters-section">
                    <div class="raters-header" onclick="toggleRaters(this)">
                        <span class="toggle-icon">▶</span>
                        <span>评论者列表 (${work.numRatings}人)</span>
                    </div>
                    <div class="raters-list">
                        ${ratersHtml}
                    </div>
                </div>
            `;

            return card;
        }

        // 切换评论者列表显示
        function toggleRaters(header) {
            const icon = header.querySelector('.toggle-icon');
            const list = header.nextElementSibling;

            icon.classList.toggle('expanded');
            list.classList.toggle('expanded');
        }

        // 更新统计信息
        function updateStats(works) {
            const stats = {
                total: works.length,
                t0: works.filter(w => w.tier === 'T0').length,
                t1: works.filter(w => w.tier === 'T1').length,
                t2: works.filter(w => w.tier === 'T2').length,
                t3: works.filter(w => w.tier === 'T3').length,
                t4: works.filter(w => w.tier === 'T4').length,
                dq: works.filter(w => w.tier === '已淘汰').length,
                insufficient: works.filter(w => w.tier === '评分不足').length,
                totalHighWeight: works.reduce((sum, w) => sum + (w.highWeightCount || 0), 0),
                totalLowWeight: works.reduce((sum, w) => sum + (w.lowWeightCount || 0), 0)
            };

            const totalRatings = stats.totalHighWeight + stats.totalLowWeight;
            const overallRatio = stats.totalLowWeight > 0
                ? (stats.totalHighWeight / stats.totalLowWeight).toFixed(2)
                : (stats.totalHighWeight > 0 ? '∞' : '0');

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <h3>总作品数</h3>
                    <div class="number">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <h3>T0等级</h3>
                    <div class="number" style="color: #FFD700;">${stats.t0}</div>
                </div>
                <div class="stat-card">
                    <h3>T1等级</h3>
                    <div class="number" style="color: #87CEEB;">${stats.t1}</div>
                </div>
                <div class="stat-card">
                    <h3>T2等级</h3>
                    <div class="number" style="color: #90EE90;">${stats.t2}</div>
                </div>
                <div class="stat-card">
                    <h3>T3等级</h3>
                    <div class="number" style="color: #FFD700;">${stats.t3}</div>
                </div>
                <div class="stat-card">
                    <h3>T4等级</h3>
                    <div class="number" style="color: #A9A9A9;">${stats.t4}</div>
                </div>
                <div class="stat-card">
                    <h3>高权重评分</h3>
                    <div class="number" style="color: #FFA500;">${stats.totalHighWeight}</div>
                </div>
                <div class="stat-card">
                    <h3>低权重评分</h3>
                    <div class="number" style="color: #32CD32;">${stats.totalLowWeight}</div>
                </div>
                <div class="stat-card">
                    <h3>整体比例</h3>
                    <div class="number" style="font-size: 20px;">1:${overallRatio}</div>
                </div>
                <div class="stat-card">
                    <h3>评分不足</h3>
                    <div class="number" style="color: #FFA500;">${stats.insufficient}</div>
                </div>
                <div class="stat-card">
                    <h3>已淘汰</h3>
                    <div class="number" style="color: #999;">${stats.dq}</div>
                </div>
            `;
        }

        // 显示加载状态
        function showLoading(message) {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>${message}</p>
                </div>
            `;
        }

        // 显示错误
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <p>❌ ${message}</p>
                </div>
            `;
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            window.parent.postMessage({
                action: 'filter',
                filterType: 'search',
                value: e.target.value
            }, '*');
        });

        // 等级筛选
        document.getElementById('tierFilter').addEventListener('change', (e) => {
            window.parent.postMessage({
                action: 'filter',
                filterType: 'tier',
                value: e.target.value
            }, '*');
        });

        // 排序
        document.getElementById('sortBy').addEventListener('change', (e) => {
            window.parent.postMessage({
                action: 'sort',
                sortBy: e.target.value
            }, '*');
        });

        // 导出数据
        document.getElementById('exportBtn').addEventListener('click', () => {
            const csvContent = generateCSV(allWorks);
            downloadCSV(csvContent, 'score-management-export.csv');
        });

        // 生成CSV
        function generateCSV(works) {
            const headers = ['作品ID', '作品标题', '作者', '报名ID', '等级', '排名', '平均分', '评论数', '评论者列表'];
            const rows = works.map(w => {
                const isDq = w.isDq === true;
                const tierValue = isDq ? '已淘汰' : w.tier;
                const scoreValue = isDq ? '已淘汰' : w.averageScore.toFixed(2);
                return [
                    w.sequenceId,
                    w.title,
                    w.ownerName || '未知投稿人',
                    w.ownerRegistrationName || '-',
                    tierValue,
                    w.rank || '-',
                    scoreValue,
                    w.numRatings,
                    w.raters.map(r => `${r.userName || '未知用户'}(${r.score}分)`).join('; ')
                ];
            });

            return [headers, ...rows]
                .map(row => row.map(cell => `"${cell}"`).join(','))
                .join('\n');
        }

        // 下载CSV
        function downloadCSV(content, filename) {
            const BOM = '\uFEFF';
            const blob = new Blob([BOM + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }
    </script>
</body>

</html>
