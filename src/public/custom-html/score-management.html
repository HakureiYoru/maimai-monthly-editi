<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分数管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background: rgba(0, 0, 0, 0);
            color: #fff;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* iOS 平滑滚动 */
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100%;
        }

        .header {
            background: rgba(42, 42, 42, 0.92);
            border: 1px solid #555;
            padding: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #777;
            background: #3a3a3a;
        }

        .search-box input::placeholder {
            color: #888;
        }

        .search-icon {
            display: none;
        }

        select,
        button {
            padding: 10px 15px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        select:hover,
        button:hover {
            background: #3a3a3a;
            border-color: #777;
        }

        button {
            background: #555;
            border-color: #666;
        }

        button:hover {
            background: #666;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(42, 42, 42, 0.92);
            border: 1px solid #555;
            padding: 15px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 8px;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }

        .works-grid {
            display: grid;
            gap: 15px;
        }

        .work-card {
            background: rgba(42, 42, 42, 0.92);
            border: 1px solid #555;
            border-left: 3px solid #666;
            padding: 20px;
            transition: all 0.3s;
        }

        .work-card:hover {
            background: #3a3a3a;
            border-left-color: #888;
        }

        .work-header {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #444;
        }

        .work-cover {
            width: 100px;
            height: 100px;
            background: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .work-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .work-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .work-title {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .work-id {
            background: #555;
            color: #fff;
            padding: 4px 12px;
            font-size: 14px;
        }

        .work-author {
            font-size: 13px;
            color: #bbb;
        }

        .work-author .registration-id {
            color: #999;
        }

        .owner-profile-link {
            display: block;
            color: #FFD700;
            text-decoration: none;
            font-size: 12px;
            margin-top: 3px;
            word-break: break-all;
            opacity: 0.8;
        }

        .owner-profile-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .tier-badge {
            display: inline-block;
            padding: 4px 12px;
            font-weight: bold;
            font-size: 14px;
        }

        .tier-T0 {
            background: #FFD700;
            color: #000;
        }

        .tier-T1 {
            background: #87CEEB;
            color: #000;
        }

        .tier-T2 {
            background: #90EE90;
            color: #000;
        }

        .tier-T3 {
            background: #FFE066;
            color: #000;
        }

        .tier-T4 {
            background: #D3D3D3;
            color: #000;
        }

        .tier-已淘汰 {
            background: #666;
            color: #fff;
            opacity: 0.6;
        }

        .tier-评分不足 {
            background: #FFA500;
            color: #fff;
        }

        /* 高权重标记 */
        .high-quality-badge {
            background: #FFD700;
            color: #000;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 5px;
            display: inline-block;
        }

        /* 权重信息区域 */
        .weight-info {
            margin-top: 15px;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
        }

        .weight-info-title {
            font-size: 13px;
            font-weight: bold;
            color: #ccc;
            margin-bottom: 8px;
        }

        .weight-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #ddd;
        }

        .weight-stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .weight-ratio-bar-container {
            margin-top: 10px;
        }

        .weight-ratio-label {
            font-size: 12px;
            color: #ccc;
            margin-bottom: 5px;
        }

        .weight-ratio-bar {
            height: 20px;
            overflow: hidden;
            background: #444;
            display: flex;
        }

        .high-weight-portion {
            background: #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 11px;
            font-weight: bold;
        }

        .low-weight-portion {
            background: #90EE90;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 11px;
            font-weight: bold;
        }

        .score-comparison {
            margin-top: 10px;
            padding: 8px;
            background: #333;
            font-size: 12px;
            border-left: 3px solid #FFD700;
            color: #ddd;
        }

        .score-comparison-item {
            margin: 3px 0;
        }

        .score-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .score-label {
            font-size: 12px;
            color: #ccc;
        }

        .score-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        .raters-section {
            margin-top: 15px;
        }

        .raters-header {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .raters-header:hover {
            color: #fff;
        }

        .toggle-icon {
            transition: transform 0.3s;
        }

        .toggle-icon.expanded {
            transform: rotate(90deg);
        }

        .raters-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .raters-list.expanded {
            max-height: 2000px;
        }

        .rater-item {
            background: #333;
            padding: 12px;
            border-left: 3px solid #666;
        }

        .rater-name {
            font-weight: bold;
            color: #fff;
            margin-bottom: 4px;
            font-size: 13px;
            word-break: break-all;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rater-name a {
            color: #FFD700;
            text-decoration: none;
        }

        .rater-name a:hover {
            color: #FFA500;
            text-decoration: underline;
        }

        .user-avatar {
            width: 20px;
            height: 20px;
            object-fit: cover;
        }

        .rater-score {
            color: #FFD700;
            font-weight: bold;
            font-size: 16px;
        }

        .rater-comment {
            margin-top: 6px;
            font-size: 12px;
            color: #ccc;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            line-clamp: 3;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .loading,
        .error {
            text-align: center;
            padding: 60px 20px;
            background: rgba(42, 42, 42, 0.92);
            border: 1px solid #555;
        }

        .loading {
            color: #ccc;
            font-size: 18px;
        }

        .error {
            color: #e74c3c;
            font-size: 18px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #444;
            border-top: 4px solid #ccc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 16px;
        }

        /* --- Rating analysis (native charts, dark theme) --- */
        .rating-analysis {
            background: rgba(42, 42, 42, 0.92);
            border: 1px solid #555;
            padding: 18px 20px;
            margin-bottom: 20px;
        }

        .rating-analysis h2 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 14px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .analysis-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .analysis-toolbar label {
            font-size: 13px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .analysis-toolbar select#raterSelect {
            min-width: 220px;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .analysis-card {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 12px;
            text-align: center;
        }

        .analysis-card .label {
            font-size: 11px;
            color: #999;
            margin-bottom: 6px;
        }

        .analysis-card .value {
            font-size: 22px;
            font-weight: bold;
            color: #eee;
            word-break: break-word;
        }

        .analysis-card .sub {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .analysis-summary-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .analysis-summary-pill {
            background: #333;
            border: 1px solid #555;
            padding: 10px 12px;
            font-size: 12px;
            color: #ddd;
            line-height: 1.45;
        }

        .analysis-summary-pill strong {
            color: #FFD700;
        }

        .chart-block {
            margin-bottom: 18px;
        }

        .chart-title {
            font-size: 13px;
            color: #bbb;
            margin-bottom: 8px;
        }

        .hist-chart {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 12px 12px 8px;
        }

        .hist-legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-size: 11px;
            color: #aaa;
        }

        .hist-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .hist-legend-swatch {
            width: 14px;
            height: 8px;
            display: inline-block;
            border-radius: 999px;
        }

        .hist-legend-swatch.bar {
            background: linear-gradient(180deg, #6ab0ff 0%, #3d7dcc 100%);
        }

        .hist-legend-swatch.line {
            height: 2px;
            background: #FFD700;
        }

        .hist-svg {
            display: block;
            width: 100%;
            height: auto;
        }

        .hist-grid-line {
            stroke: #454545;
            stroke-width: 1;
        }

        .hist-axis {
            stroke: #666;
            stroke-width: 1;
        }

        .hist-axis-text {
            fill: #8f8f8f;
            font-size: 10px;
        }

        .hist-bar-rect {
            fill: url(#histBarGradient);
        }

        .hist-line {
            fill: none;
            stroke: #FFD700;
            stroke-width: 2.5;
        }

        .hist-point {
            fill: #FFD700;
        }

        .hist-bar-value {
            fill: #cfcfcf;
            font-size: 10px;
        }

        .deviation-chart {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 10px;
            max-height: 320px;
            overflow-y: auto;
        }

        .deviation-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 52px 1fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .deviation-row .work-title {
            color: #ccc;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .deviation-bar-wrap {
            position: relative;
            height: 18px;
            background: #444;
            border-radius: 2px;
            overflow: hidden;
        }

        .deviation-bar-wrap::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #888;
            z-index: 1;
        }

        .deviation-bar {
            position: absolute;
            top: 2px;
            bottom: 2px;
            border-radius: 1px;
        }

        .deviation-bar.neg {
            right: 50%;
            background: rgba(231, 76, 60, 0.75);
        }

        .deviation-bar.pos {
            left: 50%;
            background: rgba(46, 204, 113, 0.75);
        }

        .deviation-val {
            text-align: right;
            color: #FFD700;
            font-variant-numeric: tabular-nums;
        }

        .recent-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .recent-table th,
        .recent-table td {
            border: 1px solid #444;
            padding: 6px 8px;
            text-align: left;
        }

        .recent-table th {
            background: #333;
            color: #aaa;
            font-weight: normal;
        }

        .recent-table tr:nth-child(even) td {
            background: #2f2f2f;
        }

        .analysis-empty {
            color: #888;
            font-size: 14px;
            padding: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .work-header {
                flex-direction: column;
            }

            .work-cover {
                width: 100%;
                height: 200px;
            }

            .score-info {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .raters-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📊 分数管理系统</h1>
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索作品ID或标题...">
                    <span class="search-icon">🔍</span>
                </div>
                <select id="tierFilter">
                    <option value="all">全部等级</option>
                    <option value="T0">T0</option>
                    <option value="T1">T1</option>
                    <option value="T2">T2</option>
                    <option value="T3">T3</option>
                    <option value="T4">T4</option>
                    <option value="评分不足">评分不足</option>
                    <option value="已淘汰">已淘汰</option>
                </select>
                <select id="sortBy">
                    <option value="id-asc">按ID升序</option>
                    <option value="id-desc">按ID降序</option>
                    <option value="score-desc">按分数降序</option>
                    <option value="score-asc">按分数升序</option>
                    <option value="ratings-desc">按评论数降序</option>
                </select>
                <button id="exportBtn">📥 导出数据</button>
            </div>
        </div>

        <div class="stats" id="stats">
            <!-- 统计卡片会动态生成 -->
        </div>

        <section id="ratingAnalysisSection" class="rating-analysis" style="display: none;" aria-label="评分分析">
            <h2>评分分析 / 用户打分分析</h2>
            <div class="analysis-toolbar">
                <label>
                    评分者
                    <select id="raterSelect" title="选择评分者或查看全体">
                        <option value="__all__">全部评分者</option>
                    </select>
                </label>
            </div>
            <div id="analysisBody"></div>
        </section>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载数据...</p>
            </div>
        </div>
    </div>

    <script>
        let allWorks = [];
        let config = { minRatingsForRanking: 5 };
        /** Remember dropdown when works refresh (filter/sort). */
        let lastRaterSelection = '__all__';
        const RECENT_RATINGS_LIMIT = 25;
        const MIN_RATINGS_FOR_STRICT_LOOSE = 3;
        const SCORE_MIN = 100;
        const SCORE_MAX = 1000;
        const BUCKET_SIZE = 100;
        const NUM_BUCKETS = 10; /* 100-199 ... 900-1000 */

        function isValidRaterEntry(r) {
            if (!r || r.userId === 'invalid-user') return false;
            const s = r.score;
            return typeof s === 'number' && !Number.isNaN(s);
        }

        /**
         * Flatten works -> per-rating rows with work mean (simple average) for deviation charts.
         */
        function buildAllRatings(works) {
            const rows = [];
            (works || []).forEach((work) => {
                const mean =
                    typeof work.originalAverage === 'number' && !Number.isNaN(work.originalAverage)
                        ? work.originalAverage
                        : null;
                (work.raters || []).forEach((r) => {
                    if (!isValidRaterEntry(r)) return;
                    rows.push({
                        userId: r.userId,
                        userName: r.userName || '未知用户',
                        userSlug: r.userSlug || '',
                        isHighQuality: r.isHighQuality === true,
                        score: r.score,
                        comment: r.comment || '',
                        createdDate: r.createdDate,
                        workSequenceId: work.sequenceId,
                        workTitle: work.title || '未命名作品',
                        workMean: mean,
                        deltaFromWorkMean:
                            mean != null ? r.score - mean : null,
                    });
                });
            });
            return rows;
        }

        function medianOfSorted(sorted) {
            const n = sorted.length;
            if (n === 0) return null;
            const mid = Math.floor(n / 2);
            return n % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
        }

        function medianValues(arr) {
            if (!arr.length) return null;
            const s = [...arr].sort((a, b) => a - b);
            return medianOfSorted(s);
        }

        function populationStdev(values) {
            const n = values.length;
            if (n < 2) return 0;
            const mean = values.reduce((a, b) => a + b, 0) / n;
            const v = values.reduce((sum, x) => sum + (x - mean) * (x - mean), 0) / n;
            return Math.sqrt(v);
        }

        /** 10 buckets for 100-1000: [100,200) ... [900,1000] */
        function histogramBuckets(scores) {
            const counts = new Array(NUM_BUCKETS).fill(0);
            scores.forEach((s) => {
                let idx = Math.floor((s - SCORE_MIN) / BUCKET_SIZE);
                if (idx < 0) idx = 0;
                if (idx >= NUM_BUCKETS) idx = NUM_BUCKETS - 1;
                counts[idx]++;
            });
            return counts;
        }

        function maxBucketInfo(counts) {
            let maxI = 0;
            for (let i = 1; i < counts.length; i++) {
                if (counts[i] > counts[maxI]) maxI = i;
            }
            const lo = SCORE_MIN + maxI * BUCKET_SIZE;
            const hi = maxI === NUM_BUCKETS - 1 ? SCORE_MAX : SCORE_MIN + (maxI + 1) * BUCKET_SIZE - 1;
            return { lo, hi, count: counts[maxI], index: maxI };
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function formatAnalysisDate(d) {
            if (!d) return '-';
            try {
                const t = new Date(d);
                if (Number.isNaN(t.getTime())) return String(d);
                return t.toLocaleString('zh-CN', { hour12: false });
            } catch (e) {
                return String(d);
            }
        }

        function clearRatingAnalysis() {
            const sec = document.getElementById('ratingAnalysisSection');
            const body = document.getElementById('analysisBody');
            const sel = document.getElementById('raterSelect');
            if (sec) sec.style.display = 'none';
            if (body) body.innerHTML = '';
            if (sel) {
                sel.innerHTML = '<option value="__all__">全部评分者</option>';
            }
        }

        function renderHistogram(title, counts) {
            const chartWidth = 760;
            const chartHeight = 250;
            const paddingTop = 18;
            const paddingRight = 16;
            const paddingBottom = 42;
            const paddingLeft = 42;
            const plotWidth = chartWidth - paddingLeft - paddingRight;
            const plotHeight = chartHeight - paddingTop - paddingBottom;
            const maxC = Math.max(1, ...counts);
            const slotWidth = plotWidth / counts.length;
            const barWidth = Math.max(26, slotWidth * 0.55);
            const ticks = 4;
            let bars = '';
            let labels = '';
            let values = '';
            const points = [];

            for (let i = 0; i < counts.length; i++) {
                const lo = SCORE_MIN + i * BUCKET_SIZE;
                const hi = i === NUM_BUCKETS - 1 ? SCORE_MAX : SCORE_MIN + (i + 1) * BUCKET_SIZE - 1;
                const x = paddingLeft + i * slotWidth + (slotWidth - barWidth) / 2;
                const barHeight = maxC > 0 ? (counts[i] / maxC) * plotHeight : 0;
                const y = paddingTop + plotHeight - barHeight;
                const centerX = paddingLeft + i * slotWidth + slotWidth / 2;
                const labelY = chartHeight - 12;

                bars += `<rect class="hist-bar-rect" x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${barWidth.toFixed(2)}" height="${Math.max(barHeight, 2).toFixed(2)}" rx="3"></rect>`;
                values += `<text class="hist-bar-value" x="${centerX.toFixed(2)}" y="${Math.max(y - 6, 12).toFixed(2)}" text-anchor="middle">${counts[i]}</text>`;
                labels += `<text class="hist-axis-text" x="${centerX.toFixed(2)}" y="${labelY}" text-anchor="middle">${lo}-${hi}</text>`;
                points.push(`${centerX.toFixed(2)},${y.toFixed(2)}`);
            }

            let gridLines = '';
            for (let i = 0; i <= ticks; i++) {
                const value = (maxC / ticks) * i;
                const y = paddingTop + plotHeight - (plotHeight / ticks) * i;
                gridLines += `<line class="hist-grid-line" x1="${paddingLeft}" y1="${y.toFixed(2)}" x2="${chartWidth - paddingRight}" y2="${y.toFixed(2)}"></line>`;
                gridLines += `<text class="hist-axis-text" x="${paddingLeft - 8}" y="${(y + 3).toFixed(2)}" text-anchor="end">${Math.round(value)}</text>`;
            }

            return `
                <div class="chart-block">
                    <div class="chart-title">${escapeHtml(title)}</div>
                    <div class="hist-chart" role="img" aria-label="分数分布柱状折线图">
                        <div class="hist-legend">
                            <span class="hist-legend-item"><span class="hist-legend-swatch bar"></span>柱状表示该分段评分数</span>
                            <span class="hist-legend-item"><span class="hist-legend-swatch line"></span>折线表示数量趋势</span>
                        </div>
                        <svg class="hist-svg" viewBox="0 0 ${chartWidth} ${chartHeight}" aria-hidden="true">
                            <defs>
                                <linearGradient id="histBarGradient" x1="0" x2="0" y1="0" y2="1">
                                    <stop offset="0%" stop-color="#6ab0ff"></stop>
                                    <stop offset="100%" stop-color="#3d7dcc"></stop>
                                </linearGradient>
                            </defs>
                            ${gridLines}
                            <line class="hist-axis" x1="${paddingLeft}" y1="${paddingTop + plotHeight}" x2="${chartWidth - paddingRight}" y2="${paddingTop + plotHeight}"></line>
                            <line class="hist-axis" x1="${paddingLeft}" y1="${paddingTop}" x2="${paddingLeft}" y2="${paddingTop + plotHeight}"></line>
                            ${bars}
                            <polyline class="hist-line" points="${points.join(' ')}"></polyline>
                            ${points.map((point) => {
                                const [cx, cy] = point.split(',');
                                return `<circle class="hist-point" cx="${cx}" cy="${cy}" r="3.5"></circle>`;
                            }).join('')}
                            ${values}
                            ${labels}
                        </svg>
                    </div>
                </div>`;
        }

        /**
         * Horizontal bars: deviation from per-work mean (user score - work simple average).
         */
        function renderDeviationBars(items, maxAbs) {
            const cap = maxAbs > 0 ? maxAbs : 1;
            let rows = '';
            items.forEach((it) => {
                const d = it.delta;
                const pct = Math.min(50, (Math.abs(d) / cap) * 50);
                const bar =
                    d < 0
                        ? `<div class="deviation-bar neg" style="width:${pct}%"></div>`
                        : `<div class="deviation-bar pos" style="width:${pct}%"></div>`;
                rows += `
                    <div class="deviation-row">
                        <span class="work-title" title="${escapeHtml(it.workTitle)}">#${it.workId} ${escapeHtml(it.workTitle)}</span>
                        <span class="deviation-val">${d > 0 ? '+' : ''}${d.toFixed(1)}</span>
                        <div class="deviation-bar-wrap">${bar}</div>
                    </div>`;
            });
            return `<div class="deviation-chart">${rows}</div>`;
        }

        function aggregateByUser(allRatings) {
            const map = {};
            allRatings.forEach((row) => {
                if (!map[row.userId]) {
                    map[row.userId] = {
                        userId: row.userId,
                        userName: row.userName,
                        scores: [],
                        isHighQuality: row.isHighQuality,
                    };
                }
                map[row.userId].scores.push(row.score);
                map[row.userId].isHighQuality = map[row.userId].isHighQuality || row.isHighQuality;
            });
            return map;
        }

        function updateRatingAnalysis(works) {
            const sec = document.getElementById('ratingAnalysisSection');
            const body = document.getElementById('analysisBody');
            const sel = document.getElementById('raterSelect');
            if (!sec || !body || !sel) return;

            const allRatings = buildAllRatings(works);
            if (allRatings.length === 0) {
                sec.style.display = 'block';
                body.innerHTML =
                    '<div class="analysis-empty">当前列表下暂无有效评分数据（已排除无效用户或空分）。</div>';
                sel.innerHTML = '<option value="__all__">全部评分者</option>';
                return;
            }

            const byUser = aggregateByUser(allRatings);
            const globalScores = allRatings.map((r) => r.score);
            const globalMean = globalScores.reduce((a, b) => a + b, 0) / globalScores.length;
            const globalMedian = medianValues(globalScores);
            const globalStd = populationStdev(globalScores);

            const userList = Object.keys(byUser)
                .map((uid) => ({
                    userId: uid,
                    userName: byUser[uid].userName,
                    count: byUser[uid].scores.length,
                    isHighQuality: byUser[uid].isHighQuality,
                }))
                .sort((a, b) => {
                    if (b.count !== a.count) return b.count - a.count;
                    return String(a.userName).localeCompare(String(b.userName), 'zh');
                });

            const prev =
                sel.value && Array.from(sel.options).some((o) => o.value === sel.value)
                    ? sel.value
                    : lastRaterSelection;
            sel.innerHTML =
                '<option value="__all__">全部评分者</option>' +
                userList
                    .map(
                        (u) =>
                            `<option value="${escapeHtml(u.userId)}">${escapeHtml(u.userName)} (${u.count}次)</option>`
                    )
                    .join('');
            const pick =
                prev && userList.some((u) => u.userId === prev) ? prev : '__all__';
            sel.value = pick;
            lastRaterSelection = pick;

            function renderAllView() {
                const n = globalScores.length;
                const uniq = userList.length;
                const highN = allRatings.filter((r) => r.isHighQuality).length;
                const highPct = n ? ((highN / n) * 100).toFixed(1) : '0';
                const counts = histogramBuckets(globalScores);
                const mode = maxBucketInfo(counts);

                let strictLoose = '';
                const candidates = userList.filter((u) => u.count >= MIN_RATINGS_FOR_STRICT_LOOSE);
                if (candidates.length) {
                    let strict = candidates[0];
                    let loose = candidates[0];
                    let bestS = Infinity;
                    let bestL = -Infinity;
                    candidates.forEach((u) => {
                        const scores = byUser[u.userId].scores;
                        const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
                        if (avg < bestS) {
                            bestS = avg;
                            strict = u;
                        }
                        if (avg > bestL) {
                            bestL = avg;
                            loose = u;
                        }
                    });
                    const active = userList[0];
                    strictLoose = `
                        <div class="analysis-summary-row">
                            <div class="analysis-summary-pill"><strong>最活跃</strong>：${escapeHtml(active.userName)}（${active.count} 次）</div>
                            <div class="analysis-summary-pill"><strong>最严格</strong>（均分最低，>=${MIN_RATINGS_FOR_STRICT_LOOSE}次）：${escapeHtml(strict.userName)}（${bestS.toFixed(2)}）</div>
                            <div class="analysis-summary-pill"><strong>最宽松</strong>（均分最高，>=${MIN_RATINGS_FOR_STRICT_LOOSE}次）：${escapeHtml(loose.userName)}（${bestL.toFixed(2)}）</div>
                        </div>`;
                } else {
                    const active = userList[0];
                    strictLoose = `
                        <div class="analysis-summary-row">
                            <div class="analysis-summary-pill"><strong>最活跃</strong>：${escapeHtml(active.userName)}（${active.count} 次）</div>
                            <div class="analysis-summary-pill">参与人数不足，未计算最严/最宽（需每人至少 ${MIN_RATINGS_FOR_STRICT_LOOSE} 次）。</div>
                        </div>`;
                }

                const summaryLine = `分数主要集中在 <strong>${mode.lo}-${mode.hi}</strong> 分区间（${mode.count} 条，占 ${((mode.count / n) * 100).toFixed(1)}%）。`;

                return `
                    ${strictLoose}
                    <div class="analysis-grid">
                        <div class="analysis-card"><div class="label">评分总数</div><div class="value">${n}</div></div>
                        <div class="analysis-card"><div class="label">参与评分人数</div><div class="value">${uniq}</div></div>
                        <div class="analysis-card"><div class="label">平均分</div><div class="value">${globalMean.toFixed(2)}</div></div>
                        <div class="analysis-card"><div class="label">中位数</div><div class="value">${globalMedian != null ? globalMedian.toFixed(2) : '-'}</div></div>
                        <div class="analysis-card"><div class="label">标准差</div><div class="value">${globalStd.toFixed(2)}</div><div class="sub">波动度</div></div>
                        <div class="analysis-card"><div class="label">高权重评分占比</div><div class="value">${highPct}%</div><div class="sub">${highN} / ${n}</div></div>
                    </div>
                    <div class="chart-block"><div class="chart-title">概要</div><p style="font-size:13px;color:#ccc;line-height:1.5;">${summaryLine}</p></div>
                    ${renderHistogram('全体评分分布（每 100 分一档）', counts)}
                `;
            }

            function renderUserView(userId) {
                const rows = allRatings.filter((r) => r.userId === userId);
                if (!rows.length) {
                    return '<div class="analysis-empty">无该用户数据。</div>';
                }
                const scores = rows.map((r) => r.score);
                const mean = scores.reduce((a, b) => a + b, 0) / scores.length;
                const med = medianValues(scores);
                const min = Math.min(...scores);
                const max = Math.max(...scores);
                const offset = mean - globalMean;
                const hq = rows[0].isHighQuality;
                const counts = histogramBuckets(scores);

                const devItems = rows
                    .filter((r) => r.deltaFromWorkMean != null && !Number.isNaN(r.deltaFromWorkMean))
                    .map((r) => ({
                        workId: r.workSequenceId,
                        workTitle: r.workTitle,
                        delta: r.deltaFromWorkMean,
                    }))
                    .sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));
                const maxAbs = devItems.reduce((m, x) => Math.max(m, Math.abs(x.delta)), 0);

                const recent = [...rows]
                    .sort((a, b) => {
                        const ta = a.createdDate ? new Date(a.createdDate).getTime() : 0;
                        const tb = b.createdDate ? new Date(b.createdDate).getTime() : 0;
                        return tb - ta;
                    })
                    .slice(0, RECENT_RATINGS_LIMIT);

                let table = `
                    <table class="recent-table">
                        <thead><tr><th>时间</th><th>作品</th><th>分</th><th>相对作品均分</th></tr></thead>
                        <tbody>`;
                recent.forEach((r) => {
                    const d =
                        r.deltaFromWorkMean != null && !Number.isNaN(r.deltaFromWorkMean)
                            ? (r.deltaFromWorkMean > 0 ? '+' : '') + r.deltaFromWorkMean.toFixed(1)
                            : '-';
                    table += `<tr>
                        <td>${escapeHtml(formatAnalysisDate(r.createdDate))}</td>
                        <td>#${r.workSequenceId} ${escapeHtml(r.workTitle)}</td>
                        <td>${r.score}</td>
                        <td>${d}</td>
                    </tr>`;
                });
                table += '</tbody></table>';

                return `
                    <div class="analysis-grid">
                        <div class="analysis-card"><div class="label">评分次数</div><div class="value">${scores.length}</div></div>
                        <div class="analysis-card"><div class="label">平均分</div><div class="value">${mean.toFixed(2)}</div></div>
                        <div class="analysis-card"><div class="label">中位数</div><div class="value">${med != null ? med.toFixed(2) : '-'}</div></div>
                        <div class="analysis-card"><div class="label">最高 / 最低</div><div class="value" style="font-size:18px">${max} / ${min}</div></div>
                        <div class="analysis-card"><div class="label">相对全体均分</div><div class="value">${offset > 0 ? '+' : ''}${offset.toFixed(2)}</div><div class="sub">全体均分 ${globalMean.toFixed(2)}</div></div>
                        <div class="analysis-card"><div class="label">高权重</div><div class="value" style="font-size:16px">${hq ? '是' : '否'}</div></div>
                    </div>
                    <div class="chart-block">
                        <div class="chart-title">相对各作品简单均分的偏移（相对作品内其他人共识；按绝对偏差排序）</div>
                        ${devItems.length ? renderDeviationBars(devItems, maxAbs) : '<p class="analysis-empty">无作品均分，无法计算偏移。</p>'}
                    </div>
                    ${renderHistogram('该用户评分分布（每 100 分一档）', counts)}
                    <div class="chart-block">
                        <div class="chart-title">最近 ${Math.min(RECENT_RATINGS_LIMIT, recent.length)} 条评分</div>
                        ${table}
                    </div>
                `;
            }

            sec.style.display = 'block';
            body.innerHTML =
                sel.value === '__all__' ? renderAllView() : renderUserView(sel.value);

            sel.onchange = function () {
                lastRaterSelection = sel.value;
                body.innerHTML =
                    sel.value === '__all__' ? renderAllView() : renderUserView(sel.value);
            };
        }

        // 监听来自Wix页面的消息
        window.addEventListener('message', (event) => {
            if (event.data.type === 'data') {
                allWorks = event.data.works;
                if (event.data.config && typeof event.data.config.minRatingsForRanking === 'number') {
                    config.minRatingsForRanking = event.data.config.minRatingsForRanking;
                }
                renderWorks(allWorks);
                updateStats(allWorks);
                updateRatingAnalysis(allWorks);
            } else if (event.data.type === 'loading') {
                clearRatingAnalysis();
                showLoading(event.data.message);
            } else if (event.data.type === 'error') {
                clearRatingAnalysis();
                showError(event.data.message);
            }
        });

        // 页面加载完成，通知Wix准备接收数据
        window.onload = () => {
            window.parent.postMessage({ action: 'ready' }, '*');
        };

        // 渲染作品列表
        function renderWorks(works) {
            const content = document.getElementById('content');

            if (works.length === 0) {
                content.innerHTML = '<div class="no-data">没有找到符合条件的作品</div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'works-grid';

            works.forEach(work => {
                const card = createWorkCard(work);
                grid.appendChild(card);
            });

            content.innerHTML = '';
            content.appendChild(grid);
        }

        // 创建作品卡片
        function createWorkCard(work) {
            const card = document.createElement('div');
            card.className = 'work-card';

            // 处理封面图片显示
            const coverHtml = work.coverImage && work.coverImage.trim() !== ''
                ? `<img src="${work.coverImage}" alt="封面" onerror="this.parentElement.innerHTML='${work.sequenceId}';">`
                : work.sequenceId;

            const ownerName = work.ownerName || '未知投稿人';
            const ownerRegistration = work.ownerRegistrationName
                ? `<span class="registration-id">（${work.ownerRegistrationName}）</span>`
                : '';
            const ownerProfileLink = work.ownerSlug
                ? `<a href="https://mmfc.majdata.net/profile/${work.ownerSlug}/profile" target="_blank" class="owner-profile-link">https://mmfc.majdata.net/profile/${work.ownerSlug}/profile</a>`
                : '';
            const ownerHtml = `${ownerName}${ownerRegistration}${ownerProfileLink}`;

            // 处理评论者信息，显示用户名和高权重标记
            const ratersHtml = work.raters.length > 0
                ? work.raters.map(r => {
                    // 检测是否为无效用户
                    const isInvalidUser = r.userId === 'invalid-user' || r.userName === '[无效用户ID]';
                    
                    const avatarHtml = isInvalidUser
                        ? '❓'
                        : (r.profileImageUrl
                            ? `<img src="${r.profileImageUrl}" class="user-avatar" alt="${r.userName}">`
                            : '👤');

                    const userLink = r.userSlug
                        ? `https://mmfc.majdata.net/profile/${r.userSlug}/profile`
                        : '#';

                    const userNameHtml = isInvalidUser
                        ? `<span style="color: #999; font-style: italic;">${r.userName}</span>`
                        : (r.userSlug
                            ? `<a href="${userLink}" target="_blank">${r.userName || '未知用户'}</a>`
                            : `<span>${r.userName || '未知用户'}</span>`);

                    const highQualityBadge = r.isHighQuality
                        ? '<span class="high-quality-badge">⭐高权重</span>'
                        : '';

                    return `
                    <div class="rater-item">
                        <div class="rater-name">
                            ${avatarHtml}
                            ${userNameHtml}
                            ${highQualityBadge}
                        </div>
                        <div class="rater-score">⭐ ${r.score} 分</div>
                        <div class="rater-comment">${r.comment || '无评论'}</div>
                    </div>
                    `;
                }).join('')
                : '<div class="no-data">暂无评分</div>';

            // 权重信息区域
            const highPercent = work.numRatings > 0
                ? (work.highWeightCount / work.numRatings * 100).toFixed(1)
                : 0;
            const lowPercent = work.numRatings > 0
                ? (work.lowWeightCount / work.numRatings * 100).toFixed(1)
                : 0;

            const targetRatio = work.lowWeightCount > 0
                ? (work.highWeightCount / work.lowWeightCount).toFixed(2)
                : (work.highWeightCount > 0 ? '∞' : '0');

            const ratioStatus = work.numRatings >= config.minRatingsForRanking
                ? (work.ratio >= 0.4 && work.ratio <= 0.6
                    ? '✓ 比例均衡'
                    : (work.ratio > 0.6 ? '⚠ 高权重过多' : '⚠ 高权重不足'))
                : '';

            const weightInfoHtml = work.numRatings > 0 ? `
                <div class="weight-info">
                    <div class="weight-info-title">评分权重分布</div>
                    <div class="weight-stats">
                        <div class="weight-stat-item">
                            <span style="color: #FFA500;">⭐ 高权重:</span>
                            <strong>${work.highWeightCount}人 (${highPercent}%)</strong>
                        </div>
                        <div class="weight-stat-item">
                            <span style="color: #32CD32;">● 低权重:</span>
                            <strong>${work.lowWeightCount}人 (${lowPercent}%)</strong>
                        </div>
                        <div class="weight-stat-item">
                            <span>比例:</span>
                            <strong>1:${targetRatio}</strong>
                            <span style="margin-left: 5px; color: ${ratioStatus.includes('✓') ? '#32CD32' : '#FF6B6B'};">${ratioStatus}</span>
                        </div>
                    </div>
                    <div class="weight-ratio-bar-container">
                        <div class="weight-ratio-label">权重分布可视化（目标 1:2）</div>
                        <div class="weight-ratio-bar">
                            ${work.highWeightCount > 0 ? `<div class="high-weight-portion" style="width: ${highPercent}%">${work.highWeightCount > 0 ? work.highWeightCount + '人' : ''}</div>` : ''}
                            ${work.lowWeightCount > 0 ? `<div class="low-weight-portion" style="width: ${lowPercent}%">${work.lowWeightCount > 0 ? work.lowWeightCount + '人' : ''}</div>` : ''}
                        </div>
                    </div>
                    ${work.weightedAverage !== work.originalAverage ? `
                    <div class="score-comparison">
                        <div class="score-comparison-item"><strong>加权平均分:</strong> ${work.weightedAverage.toFixed(2)} 分（排名依据）</div>
                        <div class="score-comparison-item"><strong>原始平均分:</strong> ${work.originalAverage.toFixed(2)} 分</div>
                        <div class="score-comparison-item" style="color: #666; font-size: 11px;">* 高权重评分计算时权重 ×2</div>
                    </div>
                    ` : ''}
                </div>
            ` : '';

            card.innerHTML = `
                <div class="work-header">
                    <div class="work-cover">
                        ${coverHtml}
                    </div>
                    <div class="work-info">
                        <div class="work-title">
                            <span class="work-id">#${work.sequenceId}</span>
                            <span>${work.title}</span>
                        </div>
                        <div class="work-author">投稿人：${ownerHtml}</div>
                        <div>
                            <span class="tier-badge tier-${work.tier}">${work.tier}</span>
                            ${work.rank ? `<span style="color: #999; margin-left: 10px;">排名: #${work.rank}</span>` : ''}
                        </div>
                        <div class="score-info">
                            <div class="score-item">
                                <span class="score-label">加权平均分</span>
                                <span class="score-value">${work.averageScore.toFixed(2)}</span>
                            </div>
                            <div class="score-item">
                                <span class="score-label">评论数</span>
                                <span class="score-value">${work.numRatings}</span>
                            </div>
                        </div>
                    </div>
                </div>
                ${weightInfoHtml}
                <div class="raters-section">
                    <div class="raters-header" onclick="toggleRaters(this)">
                        <span class="toggle-icon">▶</span>
                        <span>评论者列表 (${work.numRatings}人)</span>
                    </div>
                    <div class="raters-list">
                        ${ratersHtml}
                    </div>
                </div>
            `;

            return card;
        }

        // 切换评论者列表显示
        function toggleRaters(header) {
            const icon = header.querySelector('.toggle-icon');
            const list = header.nextElementSibling;

            icon.classList.toggle('expanded');
            list.classList.toggle('expanded');
        }

        // 更新统计信息
        function updateStats(works) {
            const stats = {
                total: works.length,
                t0: works.filter(w => w.tier === 'T0').length,
                t1: works.filter(w => w.tier === 'T1').length,
                t2: works.filter(w => w.tier === 'T2').length,
                t3: works.filter(w => w.tier === 'T3').length,
                t4: works.filter(w => w.tier === 'T4').length,
                dq: works.filter(w => w.tier === '已淘汰').length,
                insufficient: works.filter(w => w.tier === '评分不足').length,
                totalHighWeight: works.reduce((sum, w) => sum + (w.highWeightCount || 0), 0),
                totalLowWeight: works.reduce((sum, w) => sum + (w.lowWeightCount || 0), 0)
            };

            const totalRatings = stats.totalHighWeight + stats.totalLowWeight;
            const overallRatio = stats.totalLowWeight > 0
                ? (stats.totalHighWeight / stats.totalLowWeight).toFixed(2)
                : (stats.totalHighWeight > 0 ? '∞' : '0');

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <h3>总作品数</h3>
                    <div class="number">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <h3>T0等级</h3>
                    <div class="number" style="color: #FFD700;">${stats.t0}</div>
                </div>
                <div class="stat-card">
                    <h3>T1等级</h3>
                    <div class="number" style="color: #87CEEB;">${stats.t1}</div>
                </div>
                <div class="stat-card">
                    <h3>T2等级</h3>
                    <div class="number" style="color: #90EE90;">${stats.t2}</div>
                </div>
                <div class="stat-card">
                    <h3>T3等级</h3>
                    <div class="number" style="color: #FFD700;">${stats.t3}</div>
                </div>
                <div class="stat-card">
                    <h3>T4等级</h3>
                    <div class="number" style="color: #A9A9A9;">${stats.t4}</div>
                </div>
                <div class="stat-card">
                    <h3>高权重评分</h3>
                    <div class="number" style="color: #FFA500;">${stats.totalHighWeight}</div>
                </div>
                <div class="stat-card">
                    <h3>低权重评分</h3>
                    <div class="number" style="color: #32CD32;">${stats.totalLowWeight}</div>
                </div>
                <div class="stat-card">
                    <h3>整体比例</h3>
                    <div class="number" style="font-size: 20px;">1:${overallRatio}</div>
                </div>
                <div class="stat-card">
                    <h3>评分不足</h3>
                    <div class="number" style="color: #FFA500;">${stats.insufficient}</div>
                </div>
                <div class="stat-card">
                    <h3>已淘汰</h3>
                    <div class="number" style="color: #999;">${stats.dq}</div>
                </div>
            `;
        }

        // 显示加载状态
        function showLoading(message) {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>${message}</p>
                </div>
            `;
        }

        // 显示错误
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <p>❌ ${message}</p>
                </div>
            `;
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            window.parent.postMessage({
                action: 'filter',
                filterType: 'search',
                value: e.target.value
            }, '*');
        });

        // 等级筛选
        document.getElementById('tierFilter').addEventListener('change', (e) => {
            window.parent.postMessage({
                action: 'filter',
                filterType: 'tier',
                value: e.target.value
            }, '*');
        });

        // 排序
        document.getElementById('sortBy').addEventListener('change', (e) => {
            window.parent.postMessage({
                action: 'sort',
                sortBy: e.target.value
            }, '*');
        });

        // 导出数据
        document.getElementById('exportBtn').addEventListener('click', () => {
            const csvContent = generateCSV(allWorks);
            downloadCSV(csvContent, 'score-management-export.csv');
        });

        // 生成CSV
        function generateCSV(works) {
            const headers = ['作品ID', '作品标题', '作者', '报名ID', 'Profile链接', '等级', '排名', '平均分', '评论数', '评论者列表'];
            const rows = works.map(w => {
                const isDq = w.isDq === true;
                const tierValue = isDq ? '已淘汰' : w.tier;
                const scoreValue = w.numRatings > 0 ? w.averageScore.toFixed(2) : '-';
                const profileLink = w.ownerSlug
                    ? `https://mmfc.majdata.net/profile/${w.ownerSlug}/profile`
                    : '-';
                return [
                    w.sequenceId,
                    w.title,
                    w.ownerName || '未知投稿人',
                    w.ownerRegistrationName || '-',
                    profileLink,
                    tierValue,
                    w.rank || '-',
                    scoreValue,
                    w.numRatings,
                    w.raters.map(r => `${r.userName || '未知用户'}(${r.score}分)`).join('; ')
                ];
            });

            return [headers, ...rows]
                .map(row => row.map(cell => `"${cell}"`).join(','))
                .join('\n');
        }

        // 下载CSV
        function downloadCSV(content, filename) {
            const BOM = '\uFEFF';
            const blob = new Blob([BOM + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }
    </script>
</body>

</html>
